<script>
(function ($) {
  'use strict';

  // ── Dev mock ──────────────────────────────────────────────
  // Runs inside $(function(){}) so it always overrides window.google
  // after Apps Script has injected it. Safe for both local and production.
  function setupMock() {
    var TRIP_KEY  = 'trip-mgr-trips';
    var SCHED_KEY = 'trip-mgr-scheds';

    var SAMPLE_TRIPS = [
      { id:'TRIP-1', name:'Tokyo Adventure',  destination:'Tokyo, Japan',         startDate:'2025-07-01', endDate:'2025-07-14', status:'Planning',  notes:'Cherry blossom season' },
      { id:'TRIP-2', name:'Bali Retreat',     destination:'Bali, Indonesia',      startDate:'2025-03-10', endDate:'2025-03-17', status:'Completed', notes:'Beach and temples' },
      { id:'TRIP-3', name:'Paris Weekend',    destination:'Paris, France',        startDate:'2025-09-05', endDate:'2025-09-08', status:'Active',    notes:'Visit the Louvre' },
      { id:'TRIP-4', name:'New York Trip',    destination:'New York, USA',        startDate:'2025-11-20', endDate:'2025-11-25', status:'Planning',  notes:'' },
      { id:'TRIP-5', name:'Chiang Mai Slow',  destination:'Chiang Mai, Thailand', startDate:'2024-12-01', endDate:'2024-12-15', status:'Cancelled', notes:'Postponed' },
    ];
    var SAMPLE_SCHEDS = [
      { id:'S-1', tripId:'TRIP-1', dateTime:'2025-07-01T09:00', detail:'Fly BKK → NRT (TG680)', transport:'Suvarnabhumi Airport', cost:'15000', map:'https://maps.google.com', note:'Window seat booked', status:'Confirmed' },
      { id:'S-2', tripId:'TRIP-1', dateTime:'2025-07-01T17:00', detail:'Check in — Shinjuku Granbell Hotel', transport:'Narita Express → Shinjuku', cost:'3500', map:'', note:'', status:'Planning' },
      { id:'S-3', tripId:'TRIP-1', dateTime:'2025-07-02T09:00', detail:'Visit Senso-ji Temple', transport:'Tokyo Metro (Asakusa Line)', cost:'500', map:'https://maps.google.com', note:'Go early to avoid crowd', status:'Planning' },
      { id:'S-4', tripId:'TRIP-3', dateTime:'2025-09-05T07:30', detail:'Fly BKK → CDG (AF164)', transport:'Suvarnabhumi Airport', cost:'45000', map:'', note:'', status:'Confirmed' },
      { id:'S-5', tripId:'TRIP-3', dateTime:'2025-09-06T10:00', detail:'Visit the Louvre Museum', transport:'Métro Line 1 (Palais Royal)', cost:'1700', map:'https://maps.google.com', note:'Book tickets in advance', status:'Planning' },
    ];

    function loadTrips() {
      var raw = localStorage.getItem(TRIP_KEY);
      if (!raw) { localStorage.setItem(TRIP_KEY, JSON.stringify(SAMPLE_TRIPS)); return SAMPLE_TRIPS.slice(); }
      return JSON.parse(raw);
    }
    function saveTrips(trips) { localStorage.setItem(TRIP_KEY, JSON.stringify(trips)); }

    function loadScheds() {
      var raw = localStorage.getItem(SCHED_KEY);
      if (!raw) { localStorage.setItem(SCHED_KEY, JSON.stringify(SAMPLE_SCHEDS)); return SAMPLE_SCHEDS.slice(); }
      return JSON.parse(raw);
    }
    function saveScheds(scheds) { localStorage.setItem(SCHED_KEY, JSON.stringify(scheds)); }

    function makeRunner() {
      var _ok, _err;
      var r = {
        withSuccessHandler: function (fn) { _ok  = fn; return r; },
        withFailureHandler: function (fn) { _err = fn; return r; },

        // ── Trips ──
        getTrips: function () {
          setTimeout(function () { _ok && _ok(loadTrips()); }, 300);
        },
        addTrip: function (trip) {
          setTimeout(function () {
            trip.id = 'TRIP-' + Date.now();
            var trips = loadTrips(); trips.push(trip); saveTrips(trips);
            _ok && _ok({ success: true, id: trip.id });
          }, 250);
        },
        updateTrip: function (trip) {
          setTimeout(function () {
            var trips = loadTrips();
            $.each(trips, function (i, t) { if (t.id === trip.id) { trips[i] = trip; return false; } });
            saveTrips(trips);
            _ok && _ok({ success: true });
          }, 250);
        },
        deleteTrip: function (id) {
          setTimeout(function () {
            saveTrips($.grep(loadTrips(), function (t) { return t.id !== id; }));
            _ok && _ok({ success: true });
          }, 250);
        },

        // ── Schedules ──
        getSchedulesByTripId: function (tripId) {
          setTimeout(function () {
            var list = $.grep(loadScheds(), function (s) { return s.tripId === tripId; });
            list.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
            _ok && _ok(list);
          }, 250);
        },
        addSchedule: function (sched) {
          setTimeout(function () {
            sched.id = 'S-' + Date.now();
            var scheds = loadScheds(); scheds.push(sched); saveScheds(scheds);
            _ok && _ok({ success: true, id: sched.id });
          }, 250);
        },
        updateSchedule: function (sched) {
          setTimeout(function () {
            var scheds = loadScheds();
            $.each(scheds, function (i, s) { if (s.id === sched.id) { scheds[i] = sched; return false; } });
            saveScheds(scheds);
            _ok && _ok({ success: true });
          }, 250);
        },
        deleteSchedule: function (id) {
          setTimeout(function () {
            saveScheds($.grep(loadScheds(), function (s) { return s.id !== id; }));
            _ok && _ok({ success: true });
          }, 250);
        }
      };
      return r;
    }

    window.google = {
      script: {
        run: {
          withSuccessHandler: function (fn) { return makeRunner().withSuccessHandler(fn); },
          withFailureHandler: function (fn) { return makeRunner().withFailureHandler(fn); }
        }
      }
    };
  }

  // ── State ────────────────────────────────────────────────
  var allTrips        = [];
  var editingId       = null;
  var pendingDeleteId = null;
  var activeFilter    = '';

  // Schedule state
  var currentTrip       = null;
  var allSchedules      = [];
  var editingSchedId    = null;
  var pendingSchedDelId = null;

  // ── DOM shortcuts ────────────────────────────────────────
  var $tripList     = $('#trip-list');
  var $emptyState   = $('#empty-state');
  var $loadingState = $('#loading-state');
  var $searchInput  = $('#search-input');
  var $searchClear  = $('#search-clear');
  var $modalTitle   = $('#modal-title');
  var $btnSaveLabel = $('#btn-save-label');
  var $btnSpinner   = $('#btn-spinner');
  var $btnSave      = $('#btn-save');
  var $confirmName  = $('#confirm-name');

  // ── Init ─────────────────────────────────────────────────
  function init() {
    initSelect2();
    bindEvents();
    loadTrips();
  }

  // ── Select2 ──────────────────────────────────────────────
  function initSelect2() {
    // Filter dropdown in toolbar
    $('#filter-status').select2({
      minimumResultsForSearch: Infinity,
      width: 'resolve'
    }).on('change', function () {
      activeFilter = $(this).val();
      syncStatPills();
      renderTrips();
    });

    // Status select inside the trip form sheet
    $('#field-status').select2({
      minimumResultsForSearch: Infinity,
      dropdownParent: $('#trip-sheet'),
      width: '100%'
    });

    // Status select inside the schedule form sheet
    $('#sf-status').select2({
      minimumResultsForSearch: Infinity,
      dropdownParent: $('#sched-form-sheet'),
      width: '100%'
    });
  }

  function setFilterSelect(val) {
    $('#filter-status').val(val).trigger('change.select2');
  }

  function setStatusField(val) {
    $('#field-status').val(val).trigger('change');
  }

  // ── Events ───────────────────────────────────────────────
  function bindEvents() {
    // Open sheet
    $('#btn-add-trip-header, #btn-add-trip-fab, #btn-empty-add').on('click', openAddSheet);

    // Close sheet
    $('#modal-close, #btn-cancel').on('click', closeSheet);
    $('#sheet-backdrop').on('click', closeSheet);

    // Save
    $('#btn-save').on('click', handleSave);

    // Search
    $searchInput.on('input', function () {
      $searchClear.toggleClass('hidden', !$(this).val());
      renderTrips();
    });
    $searchClear.on('click', function () {
      $searchInput.val('');
      $searchClear.addClass('hidden');
      renderTrips();
      // test
    });

    // Stat pills as filter buttons
    $('.stat-pill').on('click', function () {
      var filter = $(this).data('filter');
      activeFilter = filter;
      setFilterSelect(filter);
      syncStatPills();
      renderTrips();
    });

    // Confirm delete trip
    $('#confirm-cancel').on('click', closeConfirm);
    $('#confirm-backdrop').on('click', closeConfirm);
    $('#confirm-delete').on('click', confirmDelete);

    // Schedule list sheet
    $('#schedule-back').on('click', closeScheduleSheet);
    $('#schedule-backdrop').on('click', closeScheduleSheet);
    $('#btn-add-schedule, #btn-empty-schedule').on('click', function () { openSchedForm(null); });
    $('#btn-export-pdf').on('click', exportTripPDF);

    // Schedule form sheet
    $('#sched-form-close, #sf-cancel').on('click', closeSchedForm);
    $('#sched-form-backdrop').on('click', closeSchedForm);
    $('#sf-save').on('click', handleSchedSave);

    // Schedule delete confirm
    $('#sched-del-cancel').on('click', closeSchedDel);
    $('#sched-del-backdrop').on('click', closeSchedDel);
    $('#sched-del-confirm').on('click', confirmSchedDel);

    // ESC key
    $(document).on('keydown', function (e) {
      if (e.key === 'Escape') {
        closeSchedDel(); closeSchedForm(); closeScheduleSheet();
        closeSheet(); closeConfirm();
      }
    });
  }

  // ── Stat pills sync ───────────────────────────────────────
  function syncStatPills() {
    $('.stat-pill').removeAttr('data-selected').removeClass('active');
    var $active = $('.stat-pill[data-filter="' + activeFilter + '"]');
    $active.attr('data-selected', '').addClass('active');
  }

  // ── Data ─────────────────────────────────────────────────
  function loadTrips() {
    $loadingState.removeClass('hidden');
    google.script.run
      .withSuccessHandler(function (trips) {
        allTrips = trips;
        $loadingState.addClass('hidden');
        renderTrips();
        updateStats();
      })
      .withFailureHandler(function (err) {
        $loadingState.addClass('hidden');
        showToast('Failed to load trips: ' + err.message, 'error');
      })
      .getTrips();
  }

  // ── Render ────────────────────────────────────────────────
  function getFiltered() {
    var q = $searchInput.val().toLowerCase().trim();
    return $.grep(allTrips, function (t) {
      var matchQ = !q ||
        t.name.toLowerCase().indexOf(q) !== -1 ||
        t.destination.toLowerCase().indexOf(q) !== -1 ||
        (t.notes || '').toLowerCase().indexOf(q) !== -1;
      var matchS = !activeFilter || t.status === activeFilter;
      return matchQ && matchS;
    });
  }

  function renderTrips() {
    $tripList.find('.trip-card').remove();
    var filtered = getFiltered();

    if (filtered.length === 0) {
      $emptyState.removeClass('hidden');
      return;
    }
    $emptyState.addClass('hidden');

    $.each(filtered, function (_, trip) {
      $tripList.append(buildCard(trip));
    });
  }

  function buildCard(trip) {
    var dateRange   = formatDateRange(trip.startDate, trip.endDate);
    var statusLower = trip.status.toLowerCase();
    var notesHtml   = trip.notes
      ? '<div class="trip-card-notes">' + esc(trip.notes) + '</div>'
      : '';
    var dayCount = '';
    if (trip.startDate && trip.endDate) {
      var days = Math.round((new Date(trip.endDate) - new Date(trip.startDate)) / 86400000) + 1;
      if (days > 0) dayCount = '<span class="trip-days-pill">' + days + 'd</span>';
    }

    var $card = $([
      '<div class="trip-card status-' + statusLower + '" data-id="' + esc(trip.id) + '">',
        '<div class="trip-card-banner">',
          '<span class="badge badge-' + statusLower + '">' + esc(trip.status) + '</span>',
        '</div>',
        '<div class="trip-card-body">',
          '<div class="trip-card-name">' + esc(trip.name) + '</div>',
          '<div class="trip-card-dest">',
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">',
              '<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>',
              '<circle cx="12" cy="10" r="3"/>',
            '</svg>',
            esc(trip.destination),
          '</div>',
          '<div class="trip-card-meta">',
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">',
              '<rect x="3" y="4" width="18" height="18" rx="2"/>',
              '<line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
            '</svg>',
            dateRange,
            dayCount,
          '</div>',
          notesHtml,
        '</div>',
        '<div class="trip-card-actions">',
          '<button class="card-action-btn" data-action="edit">',
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">',
              '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>',
              '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
            '</svg>',
            'Edit',
          '</button>',
          '<button class="card-action-btn sched" data-action="schedule">',
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">',
              '<rect x="3" y="4" width="18" height="18" rx="2"/>',
              '<line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
            '</svg>',
            'Plan',
          '</button>',
          '<button class="card-action-btn del" data-action="delete">',
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">',
              '<polyline points="3 6 5 6 21 6"/>',
              '<path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
              '<path d="M10 11v6"/><path d="M14 11v6"/>',
              '<path d="M9 6V4h6v2"/>',
            '</svg>',
            'Delete',
          '</button>',
        '</div>',
      '</div>'
    ].join(''));

    $card.find('[data-action="edit"]').on('click', function () { openEditSheet(trip); });
    $card.find('[data-action="schedule"]').on('click', function () { openScheduleSheet(trip); });
    $card.find('[data-action="delete"]').on('click', function () { openConfirm(trip); });

    return $card;
  }

  function updateStats() {
    $('#stat-total').text(allTrips.length);
    $('#stat-planning').text(countByStatus('Planning'));
    $('#stat-active').text(countByStatus('Active'));
    $('#stat-completed').text(countByStatus('Completed'));
    $('#stat-cancelled').text(countByStatus('Cancelled'));
  }

  function countByStatus(s) {
    return $.grep(allTrips, function (t) { return t.status === s; }).length;
  }

  // ── Sheet open / close ────────────────────────────────────
  function openAddSheet() {
    editingId = null;
    $modalTitle.text('Add Trip');
    $btnSaveLabel.text('Save Trip');
    $('#trip-form').trigger('reset');
    clearErrors();
    setStatusField('Planning');
    openSheet('#trip-sheet', '#sheet-backdrop');
    setTimeout(function () { $('#field-name').focus(); }, 350);
  }

  function openEditSheet(trip) {
    editingId = trip.id;
    $modalTitle.text('Edit Trip');
    $btnSaveLabel.text('Update Trip');
    clearErrors();

    $('#field-id').val(trip.id);
    $('#field-name').val(trip.name);
    $('#field-destination').val(trip.destination);
    $('#field-start').val(trip.startDate);
    $('#field-end').val(trip.endDate);
    setStatusField(trip.status);
    $('#field-notes').val(trip.notes || '');

    openSheet('#trip-sheet', '#sheet-backdrop');
  }

  function openSheet(sheetSel, backdropSel) {
    $(backdropSel).removeClass('hidden');
    $(sheetSel).removeClass('hidden');
    setTimeout(function () {
      $(sheetSel).addClass('open');
    }, 0);
    $('body').css('overflow', 'hidden');
  }

  function closeSheet() {
    $('#trip-sheet').removeClass('open');
    setTimeout(function () {
      $('#trip-sheet').addClass('hidden');
      $('#sheet-backdrop').addClass('hidden');
      $('body').css('overflow', '');
      editingId = null;
    }, 330);
  }

  // ── Save ─────────────────────────────────────────────────
  function handleSave() {
    if (!validateForm()) return;

    var trip = {
      id:          $('#field-id').val(),
      name:        $('#field-name').val().trim(),
      destination: $('#field-destination').val().trim(),
      startDate:   $('#field-start').val(),
      endDate:     $('#field-end').val(),
      status:      $('#field-status').val(),
      notes:       $('#field-notes').val().trim()
    };

    setSaving(true);

    if (editingId) {
      google.script.run
        .withSuccessHandler(function (res) {
          setSaving(false);
          if (!res.success) { showToast(res.error || 'Update failed', 'error'); return; }
          var idx = indexById(editingId);
          if (idx !== -1) allTrips[idx] = trip;
          closeSheet();
          renderTrips();
          updateStats();
          showToast('Trip updated', 'success');
        })
        .withFailureHandler(onSaveError)
        .updateTrip(trip);
    } else {
      google.script.run
        .withSuccessHandler(function (res) {
          setSaving(false);
          if (!res.success) { showToast(res.error || 'Save failed', 'error'); return; }
          trip.id = res.id;
          allTrips.push(trip);
          closeSheet();
          renderTrips();
          updateStats();
          showToast('Trip added', 'success');
        })
        .withFailureHandler(onSaveError)
        .addTrip(trip);
    }
  }

  function onSaveError(err) {
    setSaving(false);
    showToast('Error: ' + err.message, 'error');
  }

  function setSaving(on) {
    $btnSave.prop('disabled', on);
    $btnSaveLabel.toggleClass('hidden', on);
    $btnSpinner.toggleClass('hidden', !on);
  }

  // ── Validation ────────────────────────────────────────────
  function validateForm() {
    clearErrors();
    var ok = true;
    $.each(['field-name', 'field-destination', 'field-start', 'field-end'], function (_, id) {
      var $el = $('#' + id);
      if (!$el.val().trim()) { $el.addClass('error'); ok = false; }
    });
    var start = $('#field-start').val();
    var end   = $('#field-end').val();
    if (start && end && end < start) {
      $('#field-end').addClass('error');
      showToast('End date must be after start date', 'error');
      ok = false;
    }
    return ok;
  }

  function clearErrors() {
    $('#trip-form .error').removeClass('error');
  }

  // ── Delete confirm ────────────────────────────────────────
  function openConfirm(trip) {
    pendingDeleteId = trip.id;
    $confirmName.text(trip.name);
    openSheet('#confirm-sheet', '#confirm-backdrop');
  }

  function closeConfirm() {
    $('#confirm-sheet').removeClass('open');
    setTimeout(function () {
      $('#confirm-sheet').addClass('hidden');
      $('#confirm-backdrop').addClass('hidden');
      $('body').css('overflow', '');
      pendingDeleteId = null;
    }, 330);
  }

  function confirmDelete() {
    if (!pendingDeleteId) return;
    var id = pendingDeleteId;
    closeConfirm();

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.success) { showToast(res.error || 'Delete failed', 'error'); return; }
        allTrips = $.grep(allTrips, function (t) { return t.id !== id; });
        renderTrips();
        updateStats();
        showToast('Trip deleted', 'success');
      })
      .withFailureHandler(function (err) {
        showToast('Error: ' + err.message, 'error');
      })
      .deleteTrip(id);
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg, type) {
    var $t = $('<div class="toast' + (type ? ' toast-' + type : '') + '">').text(msg);
    $('#toast-container').append($t);
    setTimeout(function () { $t.remove(); }, 3200);
  }

  // ── Helpers ───────────────────────────────────────────────
  function esc(str) {
    return $('<div>').text(String(str)).html();
  }

  function indexById(id) {
    var result = -1;
    $.each(allTrips, function (i, t) {
      if (t.id === id) { result = i; return false; }
    });
    return result;
  }

  function formatDateRange(start, end) {
    if (!start && !end) return 'No dates set';
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function fmt(d) {
      if (!d) return '?';
      var p = d.split('-');
      return months[parseInt(p[1], 10) - 1] + ' ' + parseInt(p[2], 10) + ', ' + p[0];
    }
    return fmt(start) + (end ? ' → ' + fmt(end) : '');
  }

  // ── Schedule list ─────────────────────────────────────────
  function openScheduleSheet(trip) {
    currentTrip = trip;
    allSchedules = [];
    $('#schedule-trip-name').text(trip.name);
    $('#schedule-trip-dest').text(trip.destination);
    $('#schedule-list').empty();
    $('#schedule-empty').addClass('hidden');
    $('#schedule-loading').removeClass('hidden');
    openSheet('#schedule-sheet', '#schedule-backdrop');
    google.script.run
      .withSuccessHandler(function (list) {
        allSchedules = list;
        $('#schedule-loading').addClass('hidden');
        renderSchedules();
      })
      .withFailureHandler(function (err) {
        $('#schedule-loading').addClass('hidden');
        showToast('Failed to load schedules: ' + err.message, 'error');
      })
      .getSchedulesByTripId(trip.id);
  }

  function closeScheduleSheet() {
    $('#schedule-sheet').removeClass('open');
    setTimeout(function () {
      $('#schedule-sheet').addClass('hidden');
      $('#schedule-backdrop').addClass('hidden');
      $('body').css('overflow', '');
      currentTrip = null;
      allSchedules = [];
    }, 330);
  }

  function renderSchedules() {
    var $list = $('#schedule-list').empty();
    if (allSchedules.length === 0) {
      $('#schedule-empty').removeClass('hidden');
      return;
    }
    $('#schedule-empty').addClass('hidden');
    $.each(allSchedules, function (_, s) { $list.append(buildSchedItem(s)); });
  }

  function buildSchedItem(s) {
    var cls   = 's-' + s.status.toLowerCase();
    var dt    = formatDateTime(s.dateTime);
    var cost  = s.cost ? '฿' + Number(s.cost).toLocaleString() : '';
    var mapHtml = s.map
      ? '<div class="sched-meta-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><a href="' + esc(s.map) + '" target="_blank">View on Map</a></div>'
      : '';
    var transportHtml = s.transport
      ? '<div class="sched-meta-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>' + esc(s.transport) + '</div>'
      : '';
    var costHtml = cost
      ? '<div class="sched-meta-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>' + cost + '</div>'
      : '';
    var noteHtml = s.note ? '<div class="sched-note">' + esc(s.note) + '</div>' : '';

    var $item = $([
      '<div class="sched-item" data-id="' + esc(s.id) + '">',
        '<div class="sched-time-col">',
          '<div class="sched-time">' + dt.time + '</div>',
          '<div class="sched-date">' + dt.date + '</div>',
        '</div>',
        '<div class="sched-axis">',
          '<div class="sched-dot ' + cls + '"></div>',
          '<div class="sched-line"></div>',
        '</div>',
        '<div class="sched-card">',
          '<div class="sched-card-detail">' + esc(s.detail) + '</div>',
          '<div class="sched-card-meta">',
            transportHtml, costHtml, mapHtml,
          '</div>',
          noteHtml,
          '<div class="sched-card-footer">',
            '<span class="sched-badge ' + cls + '">' + esc(s.status) + '</span>',
            '<div class="sched-card-actions">',
              '<button class="sched-act-btn" data-action="edit">Edit</button>',
              '<button class="sched-act-btn del" data-action="delete">Delete</button>',
            '</div>',
          '</div>',
        '</div>',
      '</div>'
    ].join(''));

    $item.find('[data-action="edit"]').on('click', function () { openSchedForm(s); });
    $item.find('[data-action="delete"]').on('click', function () { openSchedDel(s); });
    return $item;
  }

  // ── Schedule form ──────────────────────────────────────────
  function openSchedForm(sched) {
    editingSchedId = sched ? sched.id : null;
    $('#sched-form-title').text(sched ? 'Edit Schedule' : 'Add Schedule');
    $('#sf-save-label').text(sched ? 'Update' : 'Save');
    $('#sched-form').trigger('reset');
    $('#sched-form .error').removeClass('error');

    if (sched) {
      $('#sf-id').val(sched.id);
      $('#sf-trip-id').val(sched.tripId);
      $('#sf-datetime').val(sched.dateTime);
      $('#sf-detail').val(sched.detail);
      $('#sf-transport').val(sched.transport || '');
      $('#sf-cost').val(sched.cost || '');
      $('#sf-map').val(sched.map || '');
      $('#sf-note').val(sched.note || '');
      $('#sf-status').val(sched.status).trigger('change');
    } else {
      $('#sf-trip-id').val(currentTrip ? currentTrip.id : '');
      $('#sf-status').val('Planning').trigger('change');
    }
    openSheet('#sched-form-sheet', '#sched-form-backdrop');
    setTimeout(function () { $('#sf-datetime').focus(); }, 350);
  }

  function closeSchedForm() {
    $('#sched-form-sheet').removeClass('open');
    setTimeout(function () {
      $('#sched-form-sheet').addClass('hidden');
      $('#sched-form-backdrop').addClass('hidden');
      editingSchedId = null;
    }, 330);
  }

  function handleSchedSave() {
    $('#sched-form .error').removeClass('error');
    var ok = true;
    $.each(['sf-datetime', 'sf-detail'], function (_, id) {
      var $el = $('#' + id);
      if (!$el.val().trim()) { $el.addClass('error'); ok = false; }
    });
    if (!ok) { showToast('Please fill required fields', 'error'); return; }

    var sched = {
      id:        $('#sf-id').val(),
      tripId:    $('#sf-trip-id').val(),
      dateTime:  $('#sf-datetime').val(),
      detail:    $('#sf-detail').val().trim(),
      transport: $('#sf-transport').val().trim(),
      cost:      $('#sf-cost').val(),
      map:       $('#sf-map').val().trim(),
      note:      $('#sf-note').val().trim(),
      status:    $('#sf-status').val()
    };

    $('#sf-save').prop('disabled', true);
    $('#sf-save-label').addClass('hidden');
    $('#sf-spinner').removeClass('hidden');

    var done = function () {
      $('#sf-save').prop('disabled', false);
      $('#sf-save-label').removeClass('hidden');
      $('#sf-spinner').addClass('hidden');
    };

    if (editingSchedId) {
      google.script.run
        .withSuccessHandler(function (res) {
          done();
          if (!res.success) { showToast(res.error || 'Update failed', 'error'); return; }
          $.each(allSchedules, function (i, s) { if (s.id === editingSchedId) { allSchedules[i] = sched; return false; } });
          allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
          closeSchedForm();
          renderSchedules();
          showToast('Schedule updated', 'success');
        })
        .withFailureHandler(function (err) { done(); showToast('Error: ' + err.message, 'error'); })
        .updateSchedule(sched);
    } else {
      google.script.run
        .withSuccessHandler(function (res) {
          done();
          if (!res.success) { showToast(res.error || 'Save failed', 'error'); return; }
          sched.id = res.id;
          allSchedules.push(sched);
          allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
          closeSchedForm();
          renderSchedules();
          showToast('Schedule added', 'success');
        })
        .withFailureHandler(function (err) { done(); showToast('Error: ' + err.message, 'error'); })
        .addSchedule(sched);
    }
  }

  // ── Schedule delete ────────────────────────────────────────
  function openSchedDel(sched) {
    pendingSchedDelId = sched.id;
    $('#sched-del-name').text(sched.detail);
    openSheet('#sched-del-sheet', '#sched-del-backdrop');
  }

  function closeSchedDel() {
    $('#sched-del-sheet').removeClass('open');
    setTimeout(function () {
      $('#sched-del-sheet').addClass('hidden');
      $('#sched-del-backdrop').addClass('hidden');
      pendingSchedDelId = null;
    }, 330);
  }

  function confirmSchedDel() {
    if (!pendingSchedDelId) return;
    var id = pendingSchedDelId;
    closeSchedDel();
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.success) { showToast(res.error || 'Delete failed', 'error'); return; }
        allSchedules = $.grep(allSchedules, function (s) { return s.id !== id; });
        renderSchedules();
        showToast('Schedule deleted', 'success');
      })
      .withFailureHandler(function (err) { showToast('Error: ' + err.message, 'error'); })
      .deleteSchedule(id);
  }

  // ── Export PDF ────────────────────────────────────────────
  function exportTripPDF() {
    if (!currentTrip) return;
    var trip   = currentTrip;
    var scheds = allSchedules;

    var doc = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    // Title
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.text(trip.name, 14, 22);

    // Sub-info
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(95, 99, 104);
    doc.text(trip.destination, 14, 30);
    doc.text(formatDateRange(trip.startDate, trip.endDate), 14, 36);

    // Status badge text
    doc.setFontSize(9);
    doc.text('Status: ' + trip.status, 14, 42);
    doc.setTextColor(0, 0, 0);

    // Divider
    doc.setDrawColor(224, 224, 224);
    doc.line(14, 46, 196, 46);

    if (scheds.length === 0) {
      doc.setFontSize(11);
      doc.setTextColor(95, 99, 104);
      doc.text('No schedules yet.', 14, 58);
    } else {
      var rows = $.map(scheds, function (s) {
        var dt = formatDateTime(s.dateTime);
        return [[
          dt.date + (dt.time ? '\n' + dt.time : ''),
          s.detail || '',
          s.transport || '',
          s.cost ? '฿' + Number(s.cost).toLocaleString() : '',
          s.status || '',
          s.note || ''
        ]];
      });

      doc.autoTable({
        startY: 50,
        head: [['Date & Time', 'Detail', 'Transport', 'Cost', 'Status', 'Note']],
        body: rows,
        styles: { fontSize: 8.5, cellPadding: 3, valign: 'top', overflow: 'linebreak' },
        headStyles: { fillColor: [26, 115, 232], textColor: 255, fontStyle: 'bold', fontSize: 9 },
        alternateRowStyles: { fillColor: [245, 247, 250] },
        columnStyles: {
          0: { cellWidth: 24 },
          1: { cellWidth: 55 },
          2: { cellWidth: 30 },
          3: { cellWidth: 20 },
          4: { cellWidth: 24 },
          5: { cellWidth: 'auto' }
        },
        didDrawPage: function (data) {
          // Footer with page number
          var pageCount = doc.internal.getNumberOfPages();
          doc.setFontSize(8);
          doc.setTextColor(150);
          doc.text(
            'Page ' + data.pageNumber + ' of ' + pageCount,
            data.settings.margin.left,
            doc.internal.pageSize.height - 8
          );
          doc.text('Trip Manager', 196, doc.internal.pageSize.height - 8, { align: 'right' });
        }
      });
    }

    var filename = trip.name.replace(/[^a-zA-Z0-9ก-๙\s]/g, '').replace(/\s+/g, '_') + '_plan.pdf';
    doc.save(filename);
  }

  // ── Date/time helper ───────────────────────────────────────
  function formatDateTime(dt) {
    if (!dt) return { date: '—', time: '—' };
    var parts  = dt.split('T');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var d      = parts[0].split('-');
    return {
      date: months[parseInt(d[1], 10) - 1] + ' ' + parseInt(d[2], 10),
      time: parts[1] ? parts[1].substring(0, 5) : ''
    };
  }

  // ── Boot ──────────────────────────────────────────────────
  $(function () {
    if (localStorage.getItem('dev_mock') === '1') setupMock();
    init();
    $('.stat-pill[data-filter=""]').attr('data-selected', '');
  });

}(jQuery));
</script>
