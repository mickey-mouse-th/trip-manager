    function loadTrips() {
      var raw = localStorage.getItem(TRIP_KEY);
      if (!raw) { localStorage.setItem(TRIP_KEY, JSON.stringify(SAMPLE_TRIPS)); return SAMPLE_TRIPS.slice(); }
      return JSON.parse(raw);
    }
    function saveTrips(trips) { localStorage.setItem(TRIP_KEY, JSON.stringify(trips)); }

    function loadScheds() {
      var raw = localStorage.getItem(SCHED_KEY);
      if (!raw) { localStorage.setItem(SCHED_KEY, JSON.stringify(SAMPLE_SCHEDS)); return SAMPLE_SCHEDS.slice(); }
      return JSON.parse(raw);
    }
    function saveScheds(scheds) { localStorage.setItem(SCHED_KEY, JSON.stringify(scheds)); }

    function makeRunner() {
      var _ok, _err;
      var r = {
        withSuccessHandler: function (fn) { _ok  = fn; return r; },
        withFailureHandler: function (fn) { _err = fn; return r; },

        // ── Batch ──
        getAppData: function () {
          setTimeout(function () {
            var scheds = loadScheds();
            scheds.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
            _ok && _ok({ trips: loadTrips(), schedules: scheds });
          }, 300);
        },

        // ── Trips ──
        getTrips: function () {
          setTimeout(function () { _ok && _ok(loadTrips()); }, 300);
        },
        addTrip: function (trip) {
          setTimeout(function () {
            trip.id = 'TRIP-' + Date.now();
            var trips = loadTrips(); trips.push(trip); saveTrips(trips);
            _ok && _ok({ success: true, id: trip.id });
          }, 250);
        },
        updateTrip: function (trip) {
          setTimeout(function () {
            var trips = loadTrips();
            $.each(trips, function (i, t) { if (t.id === trip.id) { trips[i] = trip; return false; } });
            saveTrips(trips);
            _ok && _ok({ success: true });
          }, 250);
        },
        deleteTrip: function (id) {
          setTimeout(function () {
            saveTrips($.grep(loadTrips(), function (t) { return t.id !== id; }));
            _ok && _ok({ success: true });
          }, 250);
        },

        // ── Schedules ──
        getSchedulesByTripId: function (tripId) {
          setTimeout(function () {
            var list = $.grep(loadScheds(), function (s) { return s.tripId === tripId; });
            list.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
            _ok && _ok(list);
          }, 250);
        },
        addSchedule: function (sched) {
          setTimeout(function () {
            sched.id = 'S-' + Date.now();
            var scheds = loadScheds(); scheds.push(sched); saveScheds(scheds);
            _ok && _ok({ success: true, id: sched.id });
          }, 250);
        },
        updateSchedule: function (sched) {
          setTimeout(function () {
            var scheds = loadScheds();
            $.each(scheds, function (i, s) { if (s.id === sched.id) { scheds[i] = sched; return false; } });
            saveScheds(scheds);
            _ok && _ok({ success: true });
          }, 250);
        },
        deleteSchedule: function (id) {
          setTimeout(function () {
            saveScheds($.grep(loadScheds(), function (s) { return s.id !== id; }));
            _ok && _ok({ success: true });
          }, 250);
        },

        // ── Auth ──
        loginUser: function (name, password) {
          setTimeout(function () {
            var users = loadUsers();
            var found = null;
            $.each(users, function (_, u) {
              if (u.name.toLowerCase() === name.toLowerCase() && u.password === password && u.isActive) {
                found = u; return false;
              }
            });
            if (found) {
              _ok && _ok({ success: true, user: { id: found.id, name: found.name, role: found.role, lang: found.lang || 'en' } });
            } else {
              _ok && _ok({ success: false, error: 'Invalid username or password' });
            }
          }, 400);
        },
        registerUser: function (name, password) {
          setTimeout(function () {
            if (!name || name.trim().length < 3) { _ok && _ok({ success: false, error: 'Username must be at least 3 characters' }); return; }
            if (!password || password.length < 6)  { _ok && _ok({ success: false, error: 'Password must be at least 6 characters' }); return; }
            var users = loadUsers();
            var taken = $.grep(users, function (u) { return u.name.toLowerCase() === name.toLowerCase(); });
            if (taken.length) { _ok && _ok({ success: false, error: 'Username already taken' }); return; }
            users.push({ id: 'USER-' + Date.now(), name: name.trim(), password: password, role: 'viewer', createdAt: new Date().toISOString().slice(0,10), lastLoginAt: '—', isActive: true });
            saveUsers(users);
            _ok && _ok({ success: true });
          }, 400);
        },
        getUsers: function () {
          setTimeout(function () {
            _ok && _ok(loadUsers().map(function (u) {
              return { id: u.id, name: u.name, role: u.role, createdAt: u.createdAt, lastLoginAt: u.lastLoginAt, isActive: u.isActive };
            }));
          }, 300);
        },
        updateUser: function (userId, updates) {
          setTimeout(function () {
            var users = loadUsers();
            $.each(users, function (i, u) {
              if (u.id === userId) {
                if (updates.role     !== undefined) users[i].role     = updates.role;
                if (updates.isActive !== undefined) users[i].isActive = updates.isActive;
                return false;
              }
            });
            saveUsers(users);
            _ok && _ok({ success: true });
          }, 250);
        },

        // ── Google OAuth (mock) ──
        getGoogleUser: function () {
          setTimeout(function () {
            // In local preview there's no real Google session — simulate no email
            _ok && _ok({ success: true, email: '' });
          }, 200);
        },
        loginWithGoogle: function (email) {
          setTimeout(function () {
            var users = loadUsers();
            var found = null;
            $.each(users, function (_, u) {
              if (u.email && u.email.toLowerCase() === email.toLowerCase() && u.authMethod === 'google' && u.isActive) {
                found = u; return false;
              }
            });
            if (found) {
              _ok && _ok({ success: true, user: { id: found.id, name: found.name, role: found.role, lang: found.lang || 'en' } });
            } else {
              _ok && _ok({ success: false, error: 'not_found', email: email });
            }
          }, 400);
        },
        registerWithGoogle: function (email, name) {
          setTimeout(function () {
            if (!name || name.trim().length < 2) { _ok && _ok({ success: false, error: 'Name must be at least 2 characters' }); return; }
            var users = loadUsers();
            var taken = $.grep(users, function (u) { return u.email && u.email.toLowerCase() === email.toLowerCase(); });
            if (taken.length) { _ok && _ok({ success: false, error: 'This Google account is already registered' }); return; }
            var nameTaken = $.grep(users, function (u) { return u.name.toLowerCase() === name.trim().toLowerCase(); });
            if (nameTaken.length) { _ok && _ok({ success: false, error: 'Display name already taken' }); return; }
            var id = 'USER-' + Date.now();
            var u = { id: id, name: name.trim(), password: '', role: 'viewer', createdAt: new Date().toISOString().slice(0,10), lastLoginAt: '—', isActive: true, email: email, authMethod: 'google', lang: 'en' };
            users.push(u);
            saveUsers(users);
            _ok && _ok({ success: true, user: { id: id, name: name.trim(), role: 'viewer', lang: 'en' } });
          }, 400);
        },
        updateProfile: function (userId, updates) {
          setTimeout(function () {
            var users = loadUsers();
            var found = false;
            $.each(users, function (i, u) {
              if (u.id === userId) {
                if (updates.name !== undefined) {
                  var n = String(updates.name).trim();
                  if (n.length < 2) { _ok && _ok({ success: false, error: 'Name must be at least 2 characters' }); return false; }
                  var nameTaken = $.grep(users, function (x, j) { return j !== i && x.name.toLowerCase() === n.toLowerCase(); });
                  if (nameTaken.length) { _ok && _ok({ success: false, error: 'Name already taken' }); return false; }
                  users[i].name = n;
                }
                if (updates.newPassword !== undefined) {
                  if (u.authMethod === 'google') { _ok && _ok({ success: false, error: 'Cannot change password for Google accounts' }); return false; }
                  if (!updates.currentPassword || updates.currentPassword !== u.password) { _ok && _ok({ success: false, error: 'Current password is incorrect' }); return false; }
                  if (updates.newPassword.length < 6) { _ok && _ok({ success: false, error: 'New password must be at least 6 characters' }); return false; }
                  users[i].password = updates.newPassword;
                }
                if (updates.lang !== undefined) users[i].lang = updates.lang;
                found = true;
                return false;
              }
            });
            if (found) { saveUsers(users); _ok && _ok({ success: true }); }
            else { _ok && _ok({ success: false, error: 'User not found' }); }
          }, 300);
        }
      };
      return r;
    }

    function loadUsers() {
      var raw = localStorage.getItem(USER_KEY);
      if (!raw) { localStorage.setItem(USER_KEY, JSON.stringify(SAMPLE_USERS)); return SAMPLE_USERS.slice(); }
      return JSON.parse(raw);
    }
    function saveUsers(users) { localStorage.setItem(USER_KEY, JSON.stringify(users)); }

    window.google = {
      script: {
        run: {
          withSuccessHandler: function (fn) { return makeRunner().withSuccessHandler(fn); },
          withFailureHandler: function (fn) { return makeRunner().withFailureHandler(fn); }
        }
      }
    };
  }

  var _schedsCache    = null; // map tripId → schedule[] pre-loaded by getAppData
  var editingId       = null;
  var pendingDeleteId = null;
  var activeFilter    = '';

  var cancelledState = false;   // tracks manual Cancel toggle in edit form

  var fpStart, fpEnd, fpSchedDate;

  var currentTrip       = null;
  var allSchedules      = [];

  // ── I18N — CSS-based; JS reads labels via computed ::before content ──────
  var _labelCache = {};
  var _$probe     = null;

  function getCurrentLang() {
    var m = ($('body').attr('class') || '').match(/\blang-(\w+)\b/);
    return m ? m[1] : 'en';
  }

  // Read a translated string from the active CSS i18n file.
  // Uses a hidden probe element to resolve the ::before content value.
  function getLabel(key) {
    if (_labelCache[key] !== undefined) return _labelCache[key];
    if (!_$probe) {
      _$probe = $('<i>').css({ position: 'absolute', left: '-9999px', visibility: 'hidden', pointerEvents: 'none' }).appendTo('body');
    }
    _$probe.attr('class', 'lbl_' + key);
    var raw = getComputedStyle(_$probe[0], '::before').getPropertyValue('content');
    // Strip surrounding quotes added by the browser (e.g.  "Hello"  →  Hello)
    var val = raw.replace(/^["']|["']$/g, '');
    if (!val || val === 'none' || val === 'normal') val = key;
    _labelCache[key] = val;
    return val;
  }

  // Switch language: update body class, clear label cache, re-apply dynamic labels.
  function applyLang(lang) {
    $('body').removeClass('lang-en lang-th lang-lo lang-ja lang-zh').addClass('lang-' + (lang || 'en'));
    _labelCache = {};
    applyTranslations();
  }

  function applyTranslations() {
    // Static labels (lbl_* classes) are handled entirely by CSS — no JS loop needed.

    // Placeholders can't be set by CSS ::before — update via JS.
    $('[data-i18n-ph]').each(function () {
      $(this).attr('placeholder', getLabel($(this).data('i18n-ph')));
    });

    // Select2 option labels (Select2 renders its own DOM, bypassing CSS ::before).
    updateSelectOptions('#filter-status', [
      { val:'',          key:'statusAll' },
      { val:'Planning',  key:'statusPlanning' },
      { val:'Active',    key:'statusActive' },
      { val:'Done',      key:'statusDone' },
      { val:'Cancelled', key:'statusCancelled' },
    ]);
    updateSelectOptions('#sf-status', [
      { val:'Planning',  key:'statusPlanning' },
      { val:'Confirmed', key:'statusConfirmed' },
      { val:'Done',      key:'statusDone' },
      { val:'Cancelled', key:'statusCancelled' },
    ]);
  }

  // Lazily resolved Select2 Utils module (accessed via AMD shim bundled in the
  // non-AMD CDN build).  Gives us RemoveData() to purge Select2's internal
  // __cache so option text changes are reflected immediately in both the closed
  // container label and the open dropdown list.
  var _s2Utils = null;
  function _getS2Utils() {
    if (_s2Utils) return _s2Utils;
    try { _s2Utils = $.fn.select2.amd.require('select2/utils'); } catch (e) {}
    return _s2Utils;
  }

  function updateSelectOptions(selector, pairs) {
    var $sel = $(selector);
    if (!$sel.length) return;
    var current = $sel.val();
    var Utils = _getS2Utils();
    $.each(pairs, function (_, p) {
      var $opt = $sel.find('option[value="' + p.val + '"]');
      $opt.text(getLabel(p.key));
      // Clear Select2 4.0.x internal __cache for this option node so both the
      // closed-state label and the open dropdown list re-read text from the DOM.
      if (Utils) { try { Utils.RemoveData($opt[0]); } catch (e) {} }
      $opt.removeData('data'); // fallback for builds that use jQuery data
    });
    $sel.val(current).trigger('change');
    // Direct patch on the rendered container as a final safety net.
    var id = $sel.attr('id');
    if (id) {
      var label = $sel.find(':selected').text() || '';
      $('#select2-' + id + '-container').text(label).prop('title', label);
    }
  }

  // ── Status computation ────────────────────────────────────
  // Planning/Active/Done are derived from dates; only Cancelled is manual.
  function computeTripStatus(trip) {
    if (trip.status === 'Cancelled') return 'Cancelled';
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    if (!trip.startDate) return 'Planning';
    var start = new Date(trip.startDate);
    start.setHours(0, 0, 0, 0);
    if (today < start) return 'Planning';
    if (trip.endDate) {
      var end = new Date(trip.endDate);
      end.setHours(0, 0, 0, 0);
      if (today > end) return 'Done';
    }
    return 'Active';
  }

  // ── DOM shortcuts ────────────────────────────────────────
  var $tripList     = $('#trip-list');
  var $emptyState   = $('#empty-state');
  var $loadingState = $('#loading-state');
  var $searchInput  = $('#search-input');
  var $searchClear  = $('#search-clear');
  var $modalTitle   = $('#modal-title');
  var $btnSaveLabel = $('#btn-save-label');
  var $btnSpinner   = $('#btn-spinner');
  var $btnSave      = $('#btn-save');
  var $confirmName  = $('#confirm-name');

  // ── Init ─────────────────────────────────────────────────
  function init() {
    initSelect2();
    initDatePickers();
    bindEvents();
    loadTrips();
  }

  // ── Select2 ──────────────────────────────────────────────
  function initSelect2() {
    // Filter dropdown in toolbar (always visible — safe to init now)
    $('#filter-status').select2({
      minimumResultsForSearch: Infinity,
      width: 'resolve'
    }).on('change', function () {
      activeFilter = $(this).val();
      syncStatPills();
      renderTrips();
    });

    // #sf-status is inside #sched-form-sheet which starts hidden (display:none).
    // Select2 can't compute dimensions on a hidden element — init lazily in
    // openSchedForm() on first open instead.
  }

  // ── Flatpickr ─────────────────────────────────────────────

  // Build custom month + year Select2 dropdowns inside the Flatpickr header.
  // We create our own <select> elements so we control navigation via
  // fp.jumpToDate() — avoiding conflicts with Flatpickr's native listeners.
  var _fpDropdownIdx = 0;
  function _initFpDropdowns(fp) {
    var $curMonth = $(fp.calendarContainer).find('.flatpickr-current-month');
    $curMonth.empty();  // replace default header

    // Give each calendar instance unique ids so Select2 can build its container IDs
    var uid = ++_fpDropdownIdx;
    var mId = 'fp-month-sel-' + uid;
    var yId = 'fp-year-sel-'  + uid;

    // Month select
    var $mSel = $('<select>').addClass('fp-month-select').attr({ id: mId, name: mId });
    fp.l10n.months.longhand.forEach(function (name, i) {
      $mSel.append($('<option>').val(i).text(name).prop('selected', i === fp.currentMonth));
    });

    // Year select (range: currentYear−5 … currentYear+10)
    var curY = fp.currentYear;
    var $ySel = $('<select>').addClass('fp-year-select').attr({ id: yId, name: yId });
    for (var y = curY - 5; y <= curY + 10; y++) {
      $ySel.append($('<option>').val(y).text(y).prop('selected', y === curY));
    }

    $curMonth.append($mSel, $ySel);

    var s2base = { minimumResultsForSearch: Infinity, dropdownParent: $(document.body) };

    // Problem 1: Flatpickr binds document.addEventListener('mousedown', documentClick) and
    //   calls fp.close() when the click target is outside calendarContainer.
    //   The Select2 container IS inside calendarContainer so its mousedown is fine,
    //   but the Select2 *dropdown list* is appended to <body> — outside.
    //   Fix: stopPropagation on mousedown at the Select2 container level (fires before
    //   the event reaches document, so Flatpickr never sees it).
    //   For dropdown-list clicks we delegate on document.body (stops before document).
    // Problem 2: Flatpickr's built-in CSS sets z-index:99999; Select2 dropdown is 1051 —
    //   so the dropdown list renders *behind* the calendar. Fix is in Style.html.

    // dropdownCssClass requires the compat module (not in CDN build).
    // Instead, add the class via select2:open after the dropdown is in the DOM.
    function _tagDropdown($sel) {
      var id = $sel.attr('id');
      $('#select2-' + id + '-results').closest('.select2-dropdown').addClass('fp-s2-dropdown');
    }

    $mSel.select2($.extend({}, s2base, { width: '130px' }));
    $mSel.next('.select2').addClass('fp-month-s2').css('width', '130px')
      .on('mousedown', function (e) { e.stopPropagation(); });
    $mSel
      .on('select2:open',    function () { _tagDropdown($mSel); })
      .on('select2:opening', function () { if ($ySel.data('select2')) $ySel.select2('close'); })
      .on('change', function () {
        var newM = parseInt($(this).val());
        if (newM !== fp.currentMonth) fp.jumpToDate(new Date(fp.currentYear, newM, 1));
      });

    $ySel.select2($.extend({}, s2base, { width: '70px' }));
    $ySel.next('.select2').on('mousedown', function (e) { e.stopPropagation(); });
    $ySel
      .on('select2:open',    function () { _tagDropdown($ySel); })
      .on('select2:opening', function () { if ($mSel.data('select2')) $mSel.select2('close'); })
      .on('change', function () {
        var newY = parseInt($(this).val());
        if (newY !== fp.currentYear) fp.jumpToDate(new Date(newY, fp.currentMonth, 1));
      });

    // Prevent option-list clicks (appended to body) from triggering Flatpickr's close
    $(document.body).on('mousedown.fpcal' + uid, '.select2-dropdown', function (e) {
      e.stopPropagation();
    });

    fp._s2Selects = { $mSel: $mSel, $ySel: $ySel, uid: uid };
  }

  // Sync Select2 display when Flatpickr navigates via prev/next arrows.
  // Uses .val().trigger('change') — Select2 updates its label, and the
  // guard (newM !== fp.currentMonth) in the change handlers stops the loop.
  function _syncFpDropdowns(fp) {
    if (!fp._s2Selects) return;
    var $mSel = fp._s2Selects.$mSel;
    var $ySel = fp._s2Selects.$ySel;

    if ($mSel.data('select2')) {
      $mSel.val(fp.currentMonth).trigger('change');
    }
    if ($ySel.data('select2')) {
      // Ensure the navigated year exists in options
      if (!$ySel.find('option[value="' + fp.currentYear + '"]').length) {
        var $opt = $('<option>').val(fp.currentYear).text(fp.currentYear);
        var inserted = false;
        $ySel.find('option').each(function () {
          if (+this.value > fp.currentYear) { $(this).before($opt); inserted = true; return false; }
        });
        if (!inserted) $ySel.append($opt);
      }
      $ySel.val(fp.currentYear).trigger('change');
    }
  }

  function initDatePickers() {
    var _fpHooks = {
      onReady:       function (_, __, fp) { _initFpDropdowns(fp); },
      onMonthChange: function (_, __, fp) { _syncFpDropdowns(fp); },
      onYearChange:  function (_, __, fp) { _syncFpDropdowns(fp); },
    };
    var dateOpts = $.extend({
      dateFormat:    'Y-m-d',
      altInput:      true,
      altFormat:     'D d M Y',
      disableMobile: true,
      onChange: function (_, __, fp) { $(fp.input).removeClass('error'); },
    }, _fpHooks);

    fpStart    = flatpickr('#field-start', dateOpts);
    fpEnd      = flatpickr('#field-end',   dateOpts);

    // ── Schedule date (date only) ─────────────────────
    fpSchedDate = flatpickr('#sf-date', $.extend({}, dateOpts, {
      onChange: function (_, __, fp) { $(fp.input).removeClass('error'); },
    }));

  }

  // Lazy-init flag for the schedule-form status Select2
  var _sfStatusReady = false;

  function initSchedStatusSelect2() {
    if (_sfStatusReady) return;
    $('#sf-status').select2({
      minimumResultsForSearch: Infinity,
      dropdownParent: $('#sched-form-sheet'),
      width: '100%'
    });
    _sfStatusReady = true;
  }

  function setFilterSelect(val) {
    $('#filter-status').val(val).trigger('change.select2');
  }

  // ── Events ───────────────────────────────────────────────
  function bindEvents() {
    // Open sheet
    $('#btn-add-trip-fab, #btn-empty-add').on('click', openAddSheet);

    // Close sheet
    $('#modal-close, #btn-cancel').on('click', closeSheet);
    $('#sheet-backdrop').on('click', closeSheet);

    // Save
    $('#btn-save').on('click', handleSave);

    // Cancel/Restore trip toggle
    $('#btn-trip-cancel-toggle').on('click', function () {
      cancelledState = !cancelledState;
      updateCancelButton();
    });

    // Search
    $searchInput.on('input', function () {
      $searchClear.toggleClass('hidden', !$(this).val());
      renderTrips();
    });
    $searchClear.on('click', function () {
      $searchInput.val('');
      $searchClear.addClass('hidden');
      renderTrips();
    });

    // Stat pills as filter buttons
    $('.stat-pill').on('click', function () {
      var filter = $(this).data('filter');
      activeFilter = filter;
      setFilterSelect(filter);
      syncStatPills();
      renderTrips();
    });

    // Confirm delete trip
    $('#confirm-cancel').on('click', closeConfirm);
    $('#confirm-backdrop').on('click', closeConfirm);
    $('#confirm-delete').on('click', confirmDelete);

    // Schedule list sheet
    $('#schedule-back').on('click', closeScheduleSheet);
    $('#schedule-backdrop').on('click', closeScheduleSheet);
    $('#btn-add-schedule, #btn-empty-schedule').on('click', function () { openSchedForm(null); });
    $('#btn-export-pdf').on('click', exportTripPDF);

    // Schedule form sheet
    $('#sched-form-close, #sf-cancel').on('click', closeSchedForm);
    $('#sched-form-backdrop').on('click', closeSchedForm);
    $('#sf-save').on('click', handleSchedSave);

    // Schedule delete confirm
    $('#sched-del-cancel').on('click', closeSchedDel);
    $('#sched-del-backdrop').on('click', closeSchedDel);
    $('#sched-del-confirm').on('click', confirmSchedDel);

    // ESC key
    $(document).on('keydown', function (e) {
      if (e.key === 'Escape') {
        closeSchedDel(); closeSchedForm(); closeScheduleSheet();
        closeSheet(); closeConfirm();
      }
    });
  }

  // ── Stat pills sync ───────────────────────────────────────
  function syncStatPills() {
    $('.stat-pill').removeAttr('data-selected').removeClass('active');
    var $active = $('.stat-pill[data-filter="' + activeFilter + '"]');
    $active.attr('data-selected', '').addClass('active');
  }

  // ── Data ─────────────────────────────────────────────────
  function loadTrips() {
    $emptyState.addClass('hidden');
    $loadingState.removeClass('hidden');
    google.script.run
      .withSuccessHandler(function (data) {
        // Build schedules cache keyed by tripId for instant schedule-sheet open
        _schedsCache = {};
        $.each(data.schedules, function (_, s) {
          if (!_schedsCache[s.tripId]) _schedsCache[s.tripId] = [];
          _schedsCache[s.tripId].push(s);
        });
        // Normalize trips — recompute status from dates (Cancelled preserved)
        allTrips = $.map(data.trips, function (t) {
          return $.extend({}, t, { status: computeTripStatus(t) });
        });
        $loadingState.addClass('hidden');
        renderTrips();
        updateStats();
      })
      .withFailureHandler(function (err) {
        $loadingState.addClass('hidden');
        showToast('Failed to load trips: ' + err.message, 'error');
      })
      .getAppData();
  }

  // ── Render ────────────────────────────────────────────────
  function getFiltered() {
    var q = $searchInput.val().toLowerCase().trim();
    return $.grep(allTrips, function (t) {
      var matchQ = !q ||
        t.name.toLowerCase().indexOf(q) !== -1 ||
        t.destination.toLowerCase().indexOf(q) !== -1 ||
        (t.notes || '').toLowerCase().indexOf(q) !== -1;
      var matchS = !activeFilter || t.status === activeFilter;
      return matchQ && matchS;
    });
  }

  function renderTrips() {
    $tripList.find('.trip-card').remove();
    var filtered = getFiltered();

    if (filtered.length === 0) {
      $emptyState.removeClass('hidden');
      return;
    }
    $emptyState.addClass('hidden');

    $.each(filtered, function (_, trip) {
      $tripList.append(buildCard(trip));
    });
  }

  function buildCard(trip) {
    var q           = $searchInput.val().toLowerCase().trim();
    var dateRange   = formatDateRange(trip.startDate, trip.endDate);
    var statusLower = trip.status.toLowerCase();
    var notesHtml   = trip.notes
      ? '<div class="trip-card-notes">' + highlight(trip.notes, q) + '</div>'
      : '';
    var dayCount = '';
    if (trip.startDate && trip.endDate) {
      var days = Math.round((new Date(trip.endDate) - new Date(trip.startDate)) / 86400000) + 1;
      if (days > 0) dayCount = '<span class="trip-days-pill">' + days + 'd</span>';
    }

    var $card = $([
      '<div class="trip-card status-' + statusLower + '" data-id="' + esc(trip.id) + '">',
        '<div class="trip-card-banner">',
          '<span class="badge badge-' + statusLower + ' lbl_status' + trip.status + '"></span>',
        '</div>',
        '<div class="trip-card-body">',
          '<div class="trip-card-name">' + highlight(trip.name, q) + '</div>',
          '<div class="trip-card-dest">',
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">',
              '<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>',
              '<circle cx="12" cy="10" r="3"/>',
            '</svg>',
            highlight(trip.destination, q),
          '</div>',
          '<div class="trip-card-meta">',
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">',
              '<rect x="3" y="4" width="18" height="18" rx="2"/>',
              '<line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
            '</svg>',
            dateRange,
            dayCount,
          '</div>',
          notesHtml,
        '</div>',
        '<div class="trip-card-actions">',
          '<button class="card-action-btn" data-action="edit">',
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">',
              '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>',
              '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
            '</svg>',
            '<span class="lbl_edit"></span>',
          '</button>',
          '<button class="card-action-btn sched" data-action="schedule">',
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">',
              '<rect x="3" y="4" width="18" height="18" rx="2"/>',
              '<line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
            '</svg>',
            '<span class="lbl_plan"></span>',
          '</button>',
          '<button class="card-action-btn del" data-action="delete">',
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">',
              '<polyline points="3 6 5 6 21 6"/>',
              '<path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
              '<path d="M10 11v6"/><path d="M14 11v6"/>',
              '<path d="M9 6V4h6v2"/>',
            '</svg>',
            '<span class="lbl_delete"></span>',
          '</button>',
        '</div>',
      '</div>'
    ].join(''));

    $card.find('[data-action="edit"]').on('click', function () { openEditSheet(trip); });
    $card.find('[data-action="schedule"]').on('click', function () { openScheduleSheet(trip); });
    $card.find('[data-action="delete"]').on('click', function () { openConfirm(trip); });

    return $card;
  }

  function updateStats() {
    $('#stat-total').text(allTrips.length);
    $('#stat-planning').text(countByStatus('Planning'));
    $('#stat-active').text(countByStatus('Active'));
    $('#stat-completed').text(countByStatus('Done'));
    $('#stat-cancelled').text(countByStatus('Cancelled'));
  }

  function countByStatus(s) {
    return $.grep(allTrips, function (t) { return t.status === s; }).length;
  }

  // ── Sheet open / close ────────────────────────────────────
  function openAddSheet() {
    editingId      = null;
    cancelledState = false;
    $modalTitle.text(getLabel('addTripTitle'));
    $btnSaveLabel.text(getLabel('saveTrip'));
    $('#trip-form').trigger('reset');
    fpStart.clear(); fpEnd.clear();
    clearErrors();
    $('#btn-trip-cancel-toggle').addClass('hidden');
    openSheet('#trip-sheet', '#sheet-backdrop');
    setTimeout(function () { $('#field-name').focus(); }, 350);
  }

  function openEditSheet(trip) {
    editingId      = trip.id;
    cancelledState = (trip.status === 'Cancelled');
    $modalTitle.text(getLabel('editTripTitle'));
    $btnSaveLabel.text(getLabel('updateTrip'));
    clearErrors();

    $('#field-id').val(trip.id);
    $('#field-name').val(trip.name);
    $('#field-destination').val(trip.destination);
    fpStart.setDate(trip.startDate, false);
    fpEnd.setDate(trip.endDate, false);
    $('#field-notes').val(trip.notes || '');

    $('#btn-trip-cancel-toggle').removeClass('hidden');
    updateCancelButton();

    openSheet('#trip-sheet', '#sheet-backdrop');
  }

  function updateCancelButton() {
    var $btn    = $('#btn-trip-cancel-toggle');
    var $banner = $('#trip-cancelled-banner');
    if (cancelledState) {
      $btn.addClass('restore').attr('aria-label', getLabel('restoreTrip'));
      $btn.find('.icon-cancel-trip').addClass('hidden');
      $btn.find('.icon-restore-trip').removeClass('hidden');
      $banner.removeClass('hidden');
    } else {
      $btn.removeClass('restore').attr('aria-label', getLabel('cancelTrip'));
      $btn.find('.icon-cancel-trip').removeClass('hidden');
      $btn.find('.icon-restore-trip').addClass('hidden');
      $banner.addClass('hidden');
    }
  }

  function openSheet(sheetSel, backdropSel) {
    $(backdropSel).removeClass('hidden');
    $(sheetSel).removeClass('hidden');
    setTimeout(function () {
      $(sheetSel).addClass('open');
    }, 0);
    $('body').css('overflow', 'hidden');
  }

  function closeSheet() {
    $('#trip-sheet').removeClass('open');
    setTimeout(function () {
      $('#trip-sheet').addClass('hidden');
      $('#sheet-backdrop').addClass('hidden');
      $('body').css('overflow', '');
      editingId = null;
    }, 330);
  }

  // ── Save ─────────────────────────────────────────────────
  function handleSave() {
    if (!validateForm()) return;

    var startDate = $('#field-start').val();
    var endDate   = $('#field-end').val();
    var trip = {
      id:          $('#field-id').val(),
      name:        $('#field-name').val().trim(),
      destination: $('#field-destination').val().trim(),
      startDate:   startDate,
      endDate:     endDate,
      status:      cancelledState ? 'Cancelled' : computeTripStatus({ startDate: startDate, endDate: endDate, status: '' }),
      notes:       $('#field-notes').val().trim()
    };

    if (editingId) {
      // ── Optimistic edit ──
      var idx      = indexById(editingId);
      var snapshot = idx !== -1 ? $.extend({}, allTrips[idx]) : null;
      if (idx !== -1) allTrips[idx] = trip;
      closeSheet(); renderTrips(); updateStats();

      google.script.run
        .withSuccessHandler(function (res) {
          if (!res.success) {
            if (idx !== -1 && snapshot) allTrips[idx] = snapshot;
            renderTrips(); updateStats();
            showToast(res.error || 'Update failed', 'error');
          } else { showToast('Trip updated', 'success'); }
        })
        .withFailureHandler(function (err) {
          if (idx !== -1 && snapshot) allTrips[idx] = snapshot;
          renderTrips(); updateStats();
          showToast('Error: ' + err.message, 'error');
        })
        .updateTrip(trip);

    } else {
      // ── Optimistic add ──
      var tempId = '__tmp-' + Date.now();
      trip.id = tempId;
      allTrips.push(trip);
      closeSheet(); renderTrips(); updateStats();

      google.script.run
        .withSuccessHandler(function (res) {
          var ti = indexById(tempId);
          if (!res.success) {
            if (ti !== -1) allTrips.splice(ti, 1);
            renderTrips(); updateStats();
            showToast(res.error || 'Save failed', 'error');
          } else {
            if (ti !== -1) allTrips[ti].id = res.id;
            renderTrips();
            showToast('Trip added', 'success');
          }
        })
        .withFailureHandler(function (err) {
          var ti = indexById(tempId);
          if (ti !== -1) allTrips.splice(ti, 1);
          renderTrips(); updateStats();
          showToast('Error: ' + err.message, 'error');
        })
        .addTrip(trip);
    }
  }

  // ── Helpers ───────────────────────────────────────────────
  function esc(str) {
    return $('<div>').text(String(str)).html();
  }

  // Wraps every occurrence of query q (case-insensitive) in a <mark> for search highlight.
  // Falls back to plain esc() when q is empty.
  function highlight(str, q) {
    var e = esc(str);
    if (!q) return e;
    var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return e.replace(re, '<mark class="search-hl">$1</mark>');
  }

  function indexById(id) {
    var result = -1;
    $.each(allTrips, function (i, t) {
      if (t.id === id) { result = i; return false; }
    });
    return result;
  }

  function indexSchedById(id) {
    var result = -1;
    $.each(allSchedules, function (i, s) {
      if (s.id === id) { result = i; return false; }
    });
    return result;
  }

  function formatDateRange(start, end) {
    if (!start && !end) return 'No dates set';
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function fmt(d) {
      if (!d) return '?';
      var p = d.split('-');
      return months[parseInt(p[1], 10) - 1] + ' ' + parseInt(p[2], 10) + ', ' + p[0];
    }
    return fmt(start) + (end ? ' → ' + fmt(end) : '');
  }

  function renderSchedules() {
    // Always sort by dateTime before rendering so the list is correct on
    // initial load (server may return unsorted rows) and after any edit.
    allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });

    var $list = $('#schedule-list').empty();
    if (allSchedules.length === 0) {
      $('#schedule-empty').removeClass('hidden');
      return;
    }
    $('#schedule-empty').addClass('hidden');
    $.each(allSchedules, function (_, s) { $list.append(buildSchedItem(s)); });
    markCurrentSchedule();
  }

  // Marks the schedule item that is "now" based on three cases:
  //
  //  ALL future  → first item pulses ("coming up next")
  //  MIXED       → last past item pulses ("you are here"); earlier ones faded
  //  ALL past    → nothing pulses (trip is over — show as plain history)
  //
  function markCurrentSchedule() {
    if (!allSchedules.length) return;
    var now = new Date();

    var lastPastIdx = -1;   // index of the last schedule that has started
    var hasAnyFuture = false;

    $.each(allSchedules, function (i, s) {
      if (!s.dateTime) return;
      if (new Date(s.dateTime) <= now) lastPastIdx = i;
      else hasAnyFuture = true;
    });

    var allPast   = lastPastIdx !== -1 && !hasAnyFuture;
    var allFuture = lastPastIdx === -1;

    $.each(allSchedules, function (i, s) {
      var $item = $('#schedule-list .sched-item[data-id="' + s.id + '"]');
      $item.find('.sched-dot').removeClass('sched-dot--now');
      $item.removeClass('sched-item--past');

      if (allPast) {
        // All done — fade everything so it reads as history, no pulse
        $item.addClass('sched-item--past');
        return;
      }
      if (allFuture) {
        // Nothing started yet — pulse only the first item
        if (i === 0) $item.find('.sched-dot').addClass('sched-dot--now');
        return;
      }
      // Mixed: you are here
      if (i < lastPastIdx)       $item.addClass('sched-item--past');
      else if (i === lastPastIdx) $item.find('.sched-dot').addClass('sched-dot--now');
    });
  }

  function buildSchedItem(s) {
    var cls   = 's-' + s.status.toLowerCase();
    var dt    = formatDateTime(s.dateTime);
    var cost  = s.cost ? '฿' + Number(s.cost).toLocaleString() : '';
    var mapHtml = s.map
      ? '<div class="sched-meta-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><a href="' + esc(s.map) + '" target="_blank">View on Map</a></div>'
      : '';
    var transportHtml = s.transport
      ? '<div class="sched-meta-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>' + esc(s.transport) + '</div>'
      : '';
    var costHtml = cost
      ? '<div class="sched-meta-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>' + cost + '</div>'
      : '';
    var noteHtml = s.note ? '<div class="sched-note">' + esc(s.note) + '</div>' : '';

    var $item = $([
      '<div class="sched-item" data-id="' + esc(s.id) + '">',
        '<div class="sched-time-col">',
          '<div class="sched-time">' + dt.time + '</div>',
          '<div class="sched-date">' + dt.date + '</div>',
        '</div>',
        '<div class="sched-axis">',
          '<div class="sched-dot ' + cls + '"></div>',
          '<div class="sched-line"></div>',
        '</div>',
        '<div class="sched-card ' + cls + '">',
          '<div class="sched-card-detail">' + esc(s.detail) + '</div>',
          '<div class="sched-card-meta">',
            transportHtml, costHtml, mapHtml,
          '</div>',
          noteHtml,
          '<div class="sched-card-footer">',
            '<span class="sched-badge ' + cls + ' lbl_status' + s.status + '"></span>',
            '<div class="sched-card-actions">',
              '<button class="sched-act-btn lbl_edit" data-action="edit"></button>',
              '<button class="sched-act-btn del lbl_delete" data-action="delete"></button>',
            '</div>',
          '</div>',
        '</div>',
      '</div>'
    ].join(''));

    $item.find('[data-action="edit"]').on('click', function () { openSchedForm(s); });
    $item.find('[data-action="delete"]').on('click', function () { openSchedDel(s); });
    return $item;
  }

  function handleSchedSave() {
    $('#sched-form .error').removeClass('error');
    var ok = true;
    $.each(['sf-date', 'sf-detail'], function (_, id) {
      var $el = $('#' + id);
      if (!$el.val().trim()) { $el.addClass('error'); ok = false; }
    });
    if (!ok) { showToast(getLabel('fillRequired'), 'error'); return; }

    var dateVal = $('#sf-date').val();
    var timeVal = $('#sf-time').val() || '00:00';

    var sched = {
      id:        $('#sf-id').val(),
      tripId:    $('#sf-trip-id').val(),
      dateTime:  dateVal + 'T' + timeVal,
      detail:    $('#sf-detail').val().trim(),
      transport: $('#sf-transport').val().trim(),
      cost:      $('#sf-cost').val(),
      map:       $('#sf-map').val().trim(),
      note:      $('#sf-note').val().trim(),
      status:    $('#sf-status').val()
    };

    if (editingSchedId) {
      // ── Optimistic edit ──
      var idx      = indexSchedById(editingSchedId);
      var snapshot = idx !== -1 ? $.extend({}, allSchedules[idx]) : null;
      if (idx !== -1) allSchedules[idx] = sched;
      allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
      closeSchedForm(); renderSchedules();

      google.script.run
        .withSuccessHandler(function (res) {
          if (!res.success) {
            if (idx !== -1 && snapshot) allSchedules[idx] = snapshot;
            allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
            renderSchedules();
            showToast(res.error || 'Update failed', 'error');
          } else {
            if (_schedsCache) _schedsCache[sched.tripId] = allSchedules.slice();
            showToast('Schedule updated', 'success');
          }
        })
        .withFailureHandler(function (err) {
          if (idx !== -1 && snapshot) allSchedules[idx] = snapshot;
          allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
          renderSchedules();
          showToast('Error: ' + err.message, 'error');
        })
        .updateSchedule(sched);

    } else {
      // ── Optimistic add ──
      var tempId = '__stmp-' + Date.now();
      sched.id = tempId;
      allSchedules.push(sched);
      allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
      closeSchedForm(); renderSchedules();

      google.script.run
        .withSuccessHandler(function (res) {
          var ti = indexSchedById(tempId);
          if (!res.success) {
            if (ti !== -1) allSchedules.splice(ti, 1);
            renderSchedules();
            showToast(res.error || 'Save failed', 'error');
          } else {
            if (ti !== -1) allSchedules[ti].id = res.id;
            allSchedules.sort(function (a, b) { return a.dateTime < b.dateTime ? -1 : 1; });
            if (_schedsCache) _schedsCache[sched.tripId] = allSchedules.slice();
            renderSchedules();
            showToast('Schedule added', 'success');
          }
        })
        .withFailureHandler(function (err) {
          var ti = indexSchedById(tempId);
          if (ti !== -1) allSchedules.splice(ti, 1);
          renderSchedules();
          showToast('Error: ' + err.message, 'error');
        })
        .addSchedule(sched);
    }
  }

  // ── Export / Print ────────────────────────────────────────
  // Opens a styled print window — browser handles all scripts natively
  // (Thai, Lao, Japanese, Chinese). User can print or Save as PDF.
  function exportTripPDF() {
    if (!currentTrip) return;
    var trip   = currentTrip;
    var scheds = allSchedules.slice().sort(function (a, b) {
      return a.dateTime < b.dateTime ? -1 : 1;
    });

    // Group by calendar day
    var byDay    = {};
    var dayOrder = [];
    $.each(scheds, function (_, s) {
      var day = s.dateTime ? s.dateTime.split('T')[0] : '__nodate__';
      if (!byDay[day]) { byDay[day] = []; dayOrder.push(day); }
      byDay[day].push(s);
    });

    // Summary stats
    var totalCost = 0;
    $.each(scheds, function (_, s) { totalCost += Number(s.cost) || 0; });
    var tripDays = '';
    if (trip.startDate && trip.endDate) {
      var d = Math.round((new Date(trip.endDate) - new Date(trip.startDate)) / 86400000) + 1;
      if (d > 0) tripDays = d;
    }

    var html = buildPrintHTML(trip, scheds, byDay, dayOrder, totalCost, tripDays);
    var win  = window.open('', '_blank', 'width=860,height=1100,menubar=no,toolbar=no');
    if (!win) { showToast('Please allow pop-ups to export the trip plan.', 'warn'); return; }
    win.document.write(html);
    win.document.close();
    win.focus();
  }

  function buildPrintHTML(trip, scheds, byDay, dayOrder, totalCost, tripDays) {
    var MONTHS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function fmtDate(d) {
      if (!d) return '';
      var p = d.split('-');
      return MONTHS[parseInt(p[1], 10) - 1] + ' ' + parseInt(p[2], 10) + ', ' + p[0];
    }
    function fmtDayHeader(d) {
      if (!d || d === '__nodate__') return 'No Date';
      var p   = d.split('-');
      var obj = new Date(d + 'T00:00:00');
      return WEEKDAYS[obj.getDay()] + ', ' + MONTHS[parseInt(p[1], 10) - 1] + ' ' + parseInt(p[2], 10) + ', ' + p[0];
    }
    function fmtTime(dt) {
      if (!dt || dt.indexOf('T') === -1) return '';
      return dt.split('T')[1].substring(0, 5);
    }

    // Status palette
    var S_COLORS = {
      Planning:  { bg:'#eff6ff', border:'#2563eb', text:'#1d4ed8', dot:'#3b82f6' },
      Active:    { bg:'#f0fdf4', border:'#16a34a', text:'#15803d', dot:'#22c55e' },
      Done:      { bg:'#faf5ff', border:'#7c3aed', text:'#6d28d9', dot:'#8b5cf6' },
      Cancelled: { bg:'#fff1f2', border:'#e11d48', text:'#be123c', dot:'#f43f5e' },
      Confirmed: { bg:'#f0fdf4', border:'#16a34a', text:'#15803d', dot:'#22c55e' },
    };
    var tripSC  = S_COLORS[trip.status]  || S_COLORS.Planning;

    // ── Schedule timeline HTML ────────────────────────────────
    var schedHtml = '';
    if (scheds.length === 0) {
      schedHtml = '<p style="color:#94a3b8;text-align:center;padding:40px 0;font-size:13px;">No schedules yet</p>';
    } else {
      $.each(dayOrder, function (_, day) {
        var items    = byDay[day];
        var itemsStr = '';
        $.each(items, function (i, s) {
          var sc      = S_COLORS[s.status] || S_COLORS.Planning;
          var isLast  = i === items.length - 1;
          var costStr = s.cost ? '฿' + Number(s.cost).toLocaleString() : '';
          var meta    = [];
          if (s.transport) meta.push('<span style="margin-right:10px;">🚌 ' + esc(s.transport) + '</span>');
          if (costStr)     meta.push('<span style="margin-right:10px;">💰 ' + costStr + '</span>');
          if (s.note)      meta.push('<span>📝 ' + esc(s.note) + '</span>');
          var mapLink = s.map
            ? '<a href="' + esc(s.map) + '" style="font-size:11px;color:#2563eb;text-decoration:none;">📍 View on Map</a>'
            : '';

          itemsStr += [
            '<div style="display:flex;gap:0;' + (isLast ? '' : 'padding-bottom:4px;') + '">',
              // Time
              '<div style="width:52px;flex-shrink:0;padding-top:3px;padding-right:10px;text-align:right;">',
                '<span style="font-size:13px;font-weight:700;color:#334155;">' + fmtTime(s.dateTime) + '</span>',
              '</div>',
              // Axis
              '<div style="width:20px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;">',
                '<div style="width:10px;height:10px;border-radius:50%;background:' + sc.dot + ';border:2px solid white;outline:2px solid ' + sc.dot + ';flex-shrink:0;margin-top:4px;"></div>',
                isLast ? '' : '<div style="flex:1;width:2px;background:#e2e8f0;min-height:28px;margin-top:4px;"></div>',
              '</div>',
              // Card
              '<div style="flex:1;padding:0 0 20px 10px;">',
                '<div style="font-size:13.5px;font-weight:600;color:#0f172a;margin-bottom:4px;">' + esc(s.detail) + '</div>',
                meta.length ? '<div style="font-size:11.5px;color:#64748b;margin-bottom:6px;">' + meta.join('') + '</div>' : '',
                mapLink ? '<div style="margin-bottom:6px;">' + mapLink + '</div>' : '',
                '<span style="font-size:10.5px;padding:2px 9px;border-radius:99px;background:' + sc.bg + ';color:' + sc.text + ';font-weight:600;border:1px solid ' + sc.border + '20;">' + esc(getLabel('status' + s.status)) + '</span>',
              '</div>',
            '</div>',
          ].join('');
        });

        schedHtml += [
          '<div style="margin-bottom:16px;break-inside:avoid;">',
            '<div style="font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;',
              'padding-bottom:7px;margin-bottom:10px;border-bottom:1px solid #f1f5f9;">' + esc(fmtDayHeader(day)) + '</div>',
            itemsStr,
          '</div>',
        ].join('');
      });
    }

    // ── Stats bar ─────────────────────────────────────────────
    var statsItems = [];
    if (tripDays) statsItems.push({ n: tripDays, lbl: 'Days' });
    statsItems.push({ n: scheds.length, lbl: 'Events' });
    if (totalCost) statsItems.push({ n: '฿' + totalCost.toLocaleString(), lbl: 'Total' });
    var statsHtml = statsItems.map(function (item, idx) {
      var border = idx > 0 ? 'border-left:1px solid rgba(255,255,255,.25);' : '';
      return '<div style="text-align:center;padding:0 20px;' + border + '">'
        + '<div style="font-size:22px;font-weight:700;">' + item.n + '</div>'
        + '<div style="font-size:10px;opacity:.75;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;">' + item.lbl + '</div>'
        + '</div>';
    }).join('');

    // ── Trip status label ─────────────────────────────────────
    var statusLabel = esc(getLabel('status' + trip.status));

    return [
      '<!DOCTYPE html><html lang="' + getCurrentLang() + '">',
      '<head>',
        '<meta charset="UTF-8">',
        '<meta name="viewport" content="width=device-width,initial-scale=1">',
        '<title>' + esc(trip.name) + '</title>',
        '<link rel="preconnect" href="https://fonts.googleapis.com">',
        '<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">',
        '<style>',
          '*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }',
          'html { -webkit-print-color-adjust:exact; print-color-adjust:exact; }',
          'body { font-family:"Sarabun","Noto Sans",system-ui,sans-serif;',
                 'background:#f8fafc; color:#0f172a; font-size:14px; line-height:1.5; }',
          '.page { max-width:720px; margin:0 auto; padding:40px 48px; }',
          '.no-print { }',
          '@media print {',
            '@page { margin:14mm 12mm; size:A4 portrait; }',
            'body { background:#fff; font-size:12px; }',
            '.page { max-width:100%; padding:0; }',
            '.no-print { display:none !important; }',
            '.card { box-shadow:none !important; }',
          '}',
        '</style>',
      '</head>',
      '<body>',
      '<div class="page">',

        // ── Print button ──────────────────────────────────────
        '<div class="no-print" style="text-align:right;margin-bottom:24px;">',
          '<button onclick="window.print()" style="',
            'padding:10px 24px;background:#2563eb;color:#fff;border:none;',
            'border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;',
            'font-family:inherit;display:inline-flex;align-items:center;gap:8px;">',
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">',
              '<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>',
              '<rect x="6" y="14" width="12" height="8"/>',
            '</svg>',
            'Print / Save as PDF',
          '</button>',
        '</div>',

        // ── Header card ───────────────────────────────────────
        '<div class="card" style="',
            'background:linear-gradient(135deg,#0f2d5a 0%,#1e4ba0 55%,#2563eb 100%);',
            'border-radius:14px;padding:28px 32px;color:#fff;margin-bottom:24px;',
            'box-shadow:0 4px 24px rgba(37,99,235,.25);">',
          '<div style="font-size:10px;font-weight:700;letter-spacing:.1em;opacity:.65;',
               'text-transform:uppercase;margin-bottom:10px;">Trip Itinerary</div>',
          '<div style="font-size:26px;font-weight:700;line-height:1.25;margin-bottom:14px;">' + esc(trip.name) + '</div>',
          '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;">',
            '<span style="font-size:13px;opacity:.9;">📍 ' + esc(trip.destination) + '</span>',
            '<span style="font-size:13px;opacity:.9;">📅 ' + esc(formatDateRange(trip.startDate, trip.endDate)) + '</span>',
            '<span style="font-size:11.5px;font-weight:600;padding:3px 11px;border-radius:99px;',
                  'background:' + tripSC.bg + ';color:' + tripSC.text + ';">' + statusLabel + '</span>',
          '</div>',
          statsHtml ? '<div style="display:flex;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2);">' + statsHtml + '</div>' : '',
        '</div>',

        // ── Notes ─────────────────────────────────────────────
        trip.notes ? [
          '<div style="background:#fff;border-left:3px solid #2563eb;border-radius:0 8px 8px 0;',
               'padding:12px 16px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);">',
            '<div style="font-size:9.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;',
                 'letter-spacing:.08em;margin-bottom:5px;">Notes</div>',
            '<div style="font-size:13px;color:#475569;">' + esc(trip.notes) + '</div>',
          '</div>',
        ].join('') : '',

        // ── Schedule section ──────────────────────────────────
        '<div style="background:#fff;border-radius:12px;padding:24px 28px;',
             'box-shadow:0 1px 4px rgba(0,0,0,.07);">',
          '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;',
               'letter-spacing:.1em;margin-bottom:18px;">Schedule</div>',
          schedHtml,
        '</div>',

        // ── Footer ────────────────────────────────────────────
        '<div style="margin-top:20px;display:flex;justify-content:space-between;',
             'font-size:10px;color:#94a3b8;padding-top:12px;border-top:1px solid #e2e8f0;">',
          '<span>Generated ' + esc(new Date().toLocaleDateString()) + '</span>',
          '<span>Trip Manager</span>',
        '</div>',

      '</div>',
      '</body></html>',
    ].join('');
  }

  // ── Date/time helper ───────────────────────────────────────
  function formatDateTime(dt) {
    if (!dt) return { date: '—', time: '—' };
    var parts  = dt.split('T');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var d      = parts[0].split('-');
    return {
      date: months[parseInt(d[1], 10) - 1] + ' ' + parseInt(d[2], 10),
      time: parts[1] ? parts[1].substring(0, 5) : ''
    };
  }

  // ── Auth ──────────────────────────────────────────────────
  function bindAuthEvents() {
    $('#go-register').on('click', function (e) {
      e.preventDefault();
      $('#lp-login').addClass('hidden'); $('#lp-register').removeClass('hidden');
      $('#login-error, #register-error').addClass('hidden');
    });
    $('#go-login').on('click', function (e) {
      e.preventDefault();
      $('#lp-register').addClass('hidden'); $('#lp-login').removeClass('hidden');
      $('#login-error, #register-error').addClass('hidden');
    });

    $('#login-form').on('submit', function (e) {
      e.preventDefault();
      var name = $('#login-name').val().trim();
      var pass = $('#login-pass').val();
      if (!name || !pass) { showLoginError('Please enter username and password.'); return; }
      setLoginLoading(true);
      google.script.run
        .withSuccessHandler(function (res) {
          setLoginLoading(false);
          if (res.success) { onLoginSuccess(res.user); } else { showLoginError(res.error); }
        })
        .withFailureHandler(function () {
          setLoginLoading(false);
          showLoginError('Connection error. Please try again.');
        })
        .loginUser(name, pass);
    });

    $('#register-form').on('submit', function (e) {
      e.preventDefault();
      var name    = $('#reg-name').val().trim();
      var pass    = $('#reg-pass').val();
      var confirm = $('#reg-confirm').val();
      if (!name || !pass) { showRegisterError('Please fill in all fields.'); return; }
      if (pass !== confirm) { showRegisterError('Passwords do not match.'); return; }
      setRegisterLoading(true);
      google.script.run
        .withSuccessHandler(function (res) {
          setRegisterLoading(false);
          if (res.success) {
            showToast('Account created! Please sign in.', 'success');
            $('#lp-register').addClass('hidden'); $('#lp-login').removeClass('hidden');
            $('#reg-name, #reg-pass, #reg-confirm').val('');
          } else { showRegisterError(res.error); }
        })
        .withFailureHandler(function () {
          setRegisterLoading(false);
          showRegisterError('Connection error. Please try again.');
        })
        .registerUser(name, pass);
    });

    $('#btn-logout').on('click', logout);
    $('#btn-users').on('click', openUsersPanel);
    $('#users-close, #users-backdrop').on('click', closeUsersPanel);
    $('#header-avatar').on('click', openProfileSheet);
    $('#profile-close, #profile-cancel, #profile-backdrop').on('click', closeProfileSheet);
    $('#profile-save').on('click', saveProfile);

    // Google auth
    $('#btn-google-login, #btn-google-register').on('click', function () {
      var $btn = $(this);
      $btn.prop('disabled', true).css('opacity', .6);
      google.script.run
        .withSuccessHandler(function (res) {
          $btn.prop('disabled', false).css('opacity', '');
          var email = res.email;
          if (!email) {
            // No Google session available (local preview or not authorized)
            showToast('Google sign-in not available here. Use username/password.', 'error');
            return;
          }
          google.script.run
            .withSuccessHandler(function (loginRes) {
              if (loginRes.success) {
                onLoginSuccess(loginRes.user);
              } else {
                // New Google user — show name form
                $('#google-new-email').val(email);
                $('#google-new-name').val('');
                $('#google-new-error').addClass('hidden');
                $('#lp-login, #lp-register').addClass('hidden');
                $('#lp-google-new').removeClass('hidden');
              }
            })
            .withFailureHandler(function () { showLoginError('Connection error.'); })
            .loginWithGoogle(email);
        })
        .withFailureHandler(function () {
          $btn.prop('disabled', false).css('opacity', '');
          showToast('Could not reach server.', 'error');
        })
        .getGoogleUser();
    });

    $('#google-new-form').on('submit', function (e) {
      e.preventDefault();
      var email = $('#google-new-email').val();
      var name  = $('#google-new-name').val().trim();
      if (!name) { $('#google-new-error').text('Please enter a display name.').removeClass('hidden'); return; }
      $('#btn-google-new').prop('disabled', true);
      $('#btn-google-new-label').addClass('hidden');
      $('#google-new-spinner').removeClass('hidden');
      google.script.run
        .withSuccessHandler(function (res) {
          $('#btn-google-new').prop('disabled', false);
          $('#btn-google-new-label').removeClass('hidden');
          $('#google-new-spinner').addClass('hidden');
          if (res.success) {
            onLoginSuccess(res.user);
          } else {
            $('#google-new-error').text(res.error).removeClass('hidden');
          }
        })
        .withFailureHandler(function () {
          $('#btn-google-new').prop('disabled', false);
          $('#btn-google-new-label').removeClass('hidden');
          $('#google-new-spinner').addClass('hidden');
          $('#google-new-error').text('Connection error.').removeClass('hidden');
        })
        .registerWithGoogle(email, name);
    });

    $('#go-login-from-google').on('click', function (e) {
      e.preventDefault();
      $('#lp-google-new').addClass('hidden');
      $('#lp-login').removeClass('hidden');
    });
  }

  function setLoginLoading(on) {
    $('#btn-login').prop('disabled', on);
    $('#btn-login-label').toggleClass('hidden', on);
    $('#login-spinner').toggleClass('hidden', !on);
  }
  function setRegisterLoading(on) {
    $('#btn-register').prop('disabled', on);
    $('#btn-register-label').toggleClass('hidden', on);
    $('#register-spinner').toggleClass('hidden', !on);
  }
  function showLoginError(msg)    { $('#login-error').text(msg).removeClass('hidden'); }
  function showRegisterError(msg) { $('#register-error').text(msg).removeClass('hidden'); }

  function onLoginSuccess(user) {
    currentUser = user;
    localStorage.setItem('tm_user', JSON.stringify(user));
    $('#login-screen').addClass('fade-out');
    setTimeout(function () { $('#login-screen').addClass('hidden'); }, 350);
    applyRolePermissions();
    updateHeaderUser();
    applyLang(user.lang || 'en');
    if (!allTrips.length) init();
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem('tm_user');
    $('body').removeClass('role-admin role-staff role-viewer');
    $('#header-user, #btn-users').addClass('hidden');
    allTrips = []; renderTrips();
    $('#login-screen').removeClass('hidden fade-out');
    $('#login-name, #login-pass').val('');
    $('#login-error').addClass('hidden');
  }

  function applyRolePermissions() {
    if (!currentUser) return;
    $('body').removeClass('role-admin role-staff role-viewer').addClass('role-' + currentUser.role);
  }

  function updateHeaderUser() {
    if (!currentUser) return;
    $('#header-avatar').text(currentUser.name.charAt(0).toUpperCase());
    $('#header-user-name').text(currentUser.name);
    $('#header-user-role').text(currentUser.role);
    $('#header-user').removeClass('hidden');
    if (currentUser.role === 'admin')  $('#btn-users').removeClass('hidden');
  }

  // ── Users panel (admin only) ──────────────────────────────
  function openUsersPanel() {
    $('#users-list').empty();
    $('#users-loading').removeClass('hidden');
    openSheet('#users-sheet', '#users-backdrop');
    google.script.run
      .withSuccessHandler(function (list) {
        $('#users-loading').addClass('hidden');
        renderUsers(list);
      })
      .withFailureHandler(function () {
        $('#users-loading').addClass('hidden');
        showToast('Failed to load users', 'error');
      })
      .getUsers();
  }

  function closeUsersPanel() {
    $('#users-sheet').removeClass('open');
    setTimeout(function () {
      $('#users-sheet, #users-backdrop').addClass('hidden');
      $('body').css('overflow', '');
    }, 330);
  }

  function renderUsers(list) {
    var $ul = $('#users-list').empty();
    if (!list.length) {
      $ul.html('<p style="color:var(--c-text-muted);text-align:center;padding:32px">No users found.</p>');
      return;
    }
    $.each(list, function (_, u) {
      var isMe = currentUser && u.id === currentUser.id;
      var $row = $([
        '<div class="user-row' + (u.isActive ? '' : ' inactive') + '" data-id="' + esc(u.id) + '">',
          '<div class="user-avatar ua-' + esc(u.role) + '">' + esc(u.name.charAt(0).toUpperCase()) + '</div>',
          '<div class="user-info">',
            '<div class="user-name">' + esc(u.name) + (isMe ? ' <span style="font-size:11px;color:var(--c-text-muted)">(you)</span>' : '') + '</div>',
            '<div class="user-meta">Joined ' + esc(u.createdAt) + ' · Last: ' + esc(u.lastLoginAt) + '</div>',
          '</div>',
          '<select class="user-role-select"' + (isMe ? ' disabled' : '') + '>',
            '<option value="admin"'  + (u.role === 'admin'  ? ' selected' : '') + '>Admin</option>',
            '<option value="staff"'  + (u.role === 'staff'  ? ' selected' : '') + '>Staff</option>',
            '<option value="viewer"' + (u.role === 'viewer' ? ' selected' : '') + '>Viewer</option>',
          '</select>',
          '<button class="toggle-active' + (u.isActive ? ' on' : '') + '"' + (isMe ? ' disabled style="opacity:.4"' : '') + '"></button>',
        '</div>',
      ].join(''));

      $ul.append($row);

      // Init Select2 after row is in the DOM (needs visible parent to compute size)
      $row.find('.user-role-select').select2({
        minimumResultsForSearch: Infinity,
        dropdownParent: $(document.body),
        width: '110px',
      }).on('change', function () {
        var newRole = $(this).val();
        $row.find('.user-avatar').removeClass('ua-admin ua-staff ua-viewer').addClass('ua-' + newRole);
        google.script.run
          .withFailureHandler(function () { showToast('Failed to update role', 'error'); })
          .updateUser(u.id, { role: newRole });
      });

      $row.find('.toggle-active').on('click', function () {
        if (isMe) return;
        var $btn   = $(this);
        var newVal = !$btn.hasClass('on');
        $btn.toggleClass('on', newVal);
        $row.toggleClass('inactive', !newVal);
        google.script.run
          .withFailureHandler(function () {
            $btn.toggleClass('on', !newVal);
            $row.toggleClass('inactive', newVal);
            showToast('Failed to update user', 'error');
          })
          .updateUser(u.id, { isActive: newVal });
      });
    });
  }

  // ── Profile sheet ────────────────────────────────────────
  var selectedLang = 'en';

  function openProfileSheet() {
    if (!currentUser) return;
    selectedLang = getCurrentLang();  // reads lang-XX class from body

    $('#profile-avatar-lg').text(currentUser.name.charAt(0).toUpperCase());
    $('#profile-display-name').text(currentUser.name);
    $('#profile-display-role').text(currentUser.role);
    $('#pf-name').val(currentUser.name);
    $('#pf-current-pass, #pf-new-pass').val('');

    // Hide password section for Google accounts
    var isGoogle = currentUser.authMethod === 'google';
    $('#pf-password-section').toggleClass('hidden', isGoogle);

    // Highlight selected lang
    $('.lang-btn').removeClass('selected');
    $('.lang-btn[data-lang="' + selectedLang + '"]').addClass('selected');

    $('.lang-btn').off('click.lang').on('click.lang', function () {
      selectedLang = $(this).data('lang');
      $('.lang-btn').removeClass('selected');
      $(this).addClass('selected');
    });

    openSheet('#profile-sheet', '#profile-backdrop');
    setTimeout(function () { $('#pf-name').focus(); }, 350);
  }

  function closeProfileSheet() {
    $('#profile-sheet').removeClass('open');
    setTimeout(function () {
      $('#profile-sheet, #profile-backdrop').addClass('hidden');
      $('body').css('overflow', '');
    }, 330);
  }

  function saveProfile() {
    if (!currentUser) return;
    var newName    = $('#pf-name').val().trim();
    var currentPw  = $('#pf-current-pass').val();
    var newPw      = $('#pf-new-pass').val();

    var updates = {};
    if (newName && newName !== currentUser.name) updates.name = newName;
    if (newPw) {
      updates.currentPassword = currentPw;
      updates.newPassword     = newPw;
    }
    if (selectedLang !== getCurrentLang()) updates.lang = selectedLang;

    if (!Object.keys(updates).length) { closeProfileSheet(); return; }

    $('#profile-save').prop('disabled', true);
    $('#profile-save-label').addClass('hidden');
    $('#profile-spinner').removeClass('hidden');

    google.script.run
      .withSuccessHandler(function (res) {
        $('#profile-save').prop('disabled', false);
        $('#profile-save-label').removeClass('hidden');
        $('#profile-spinner').addClass('hidden');
        if (!res.success) { showToast(res.error || 'Update failed', 'error'); return; }
        if (updates.name)    currentUser.name = updates.name;
        if (updates.lang)    currentUser.lang = updates.lang;
        localStorage.setItem('tm_user', JSON.stringify(currentUser));
        updateHeaderUser();
        applyLang(currentUser.lang || 'en');
        closeProfileSheet();
        showToast('Profile updated', 'success');
      })
      .withFailureHandler(function (err) {
        $('#profile-save').prop('disabled', false);
        $('#profile-save-label').removeClass('hidden');
        $('#profile-spinner').addClass('hidden');
        showToast('Error: ' + err.message, 'error');
      })
      .updateProfile(currentUser.id, updates);
  }

  // ── Boot ──────────────────────────────────────────────────
  $(function () {
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:') setupMock();
    bindAuthEvents();
    var saved = localStorage.getItem('tm_user');
    $('body').removeClass('app-booting');
    if (saved) {
      try {
        currentUser = JSON.parse(saved);
        applyRolePermissions();
        updateHeaderUser();
        applyLang(currentUser.lang || 'en');
        init();
      } catch (e) {
        localStorage.removeItem('tm_user');
        $('#login-screen').removeClass('hidden');
      }
    } else {
      $('#login-screen').removeClass('hidden');
    }
    $('.stat-pill[data-filter=""]').attr('data-selected', '');
  });

}(jQuery));
</script>
