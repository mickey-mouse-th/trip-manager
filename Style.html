<style>
  /* ── Reset & tokens ──────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-primary:    #4f46e5;
    --c-primary-dk: #3730a3;
    --c-danger:     #ef4444;
    --c-danger-dk:  #dc2626;
    --c-surface:    #ffffff;
    --c-bg:         #f1f5f9;
    --c-border:     #e2e8f0;
    --c-text:       #0f172a;
    --c-text-muted: #64748b;

    --s-planning:   #eff6ff; --s-planning-t:   #2563eb;
    --s-active:     #f0fdf4; --s-active-t:     #16a34a;
    --s-done:       #faf5ff; --s-done-t:       #7c3aed;
    --s-completed:  #faf5ff; --s-completed-t:  #7c3aed;
    --s-cancelled:  #fff1f2; --s-cancelled-t:  #e11d48;

    --grad-planning:   linear-gradient(135deg, #1d4ed8 0%, #60a5fa 100%);
    --grad-active:     linear-gradient(135deg, #15803d 0%, #34d399 100%);
    --grad-done:       linear-gradient(135deg, #6d28d9 0%, #c084fc 100%);
    --grad-completed:  linear-gradient(135deg, #6d28d9 0%, #c084fc 100%);
    --grad-cancelled:  linear-gradient(135deg, #475569 0%, #94a3b8 100%);

    --r:    16px;
    --r-sm: 12px;
    --shadow:    0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 24px 64px rgba(0,0,0,.18);
    --ease: .2s ease;
  }

  body {
    font-family: -apple-system, 'SF Pro Display', 'Google Sans', Roboto, Arial, sans-serif;
    font-size: 15px;
    color: var(--c-text);
    background: var(--c-bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ──────────────────────────────────────────── */
  .app-header {
    background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 100%);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.2px;
  }
  .app-logo svg { stroke: rgba(255,255,255,.9); flex-shrink: 0; }
  .btn-header-add {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    background: rgba(255,255,255,.18);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.3);
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background var(--ease);
  }
  .btn-header-add:hover { background: rgba(255,255,255,.28); }
  @media (min-width: 640px) { .btn-header-add { display: flex; } }

  /* ── Main ────────────────────────────────────────────── */
  .app-main {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }
  @media (min-width: 640px) { .app-main { padding: 28px 24px 48px; } }

  /* ── Stats pills ─────────────────────────────────────── */
  .stats-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .stats-strip::-webkit-scrollbar { display: none; }

  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 10px 20px;
    border-radius: 14px;
    border: 2px solid transparent;
    background: var(--c-surface);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    transition: border-color var(--ease), background var(--ease), transform var(--ease);
  }
  .stat-pill:active { transform: scale(.97); }
  .stat-num { font-size: 22px; font-weight: 800; line-height: 1; letter-spacing: -.5px; }
  .stat-lbl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; color: var(--c-text-muted); }
  .stat-pill[data-selected] .stat-lbl { color: inherit; }

  .stat-pill.active .stat-num            { color: var(--c-primary); }
  .stat-pill.active[data-selected]       { border-color: var(--c-primary); background: #ede9fe; }

  .stat-pill.planning .stat-num          { color: var(--s-planning-t); }
  .stat-pill.planning[data-selected]     { border-color: var(--s-planning-t); background: var(--s-planning); }

  .stat-pill.active-trip .stat-num       { color: var(--s-active-t); }
  .stat-pill.active-trip[data-selected]  { border-color: var(--s-active-t); background: var(--s-active); }

  .stat-pill.done .stat-num              { color: var(--s-done-t); }
  .stat-pill.done[data-selected]         { border-color: var(--s-done-t); background: var(--s-done); }
  .stat-pill.completed .stat-num         { color: var(--s-completed-t); }
  .stat-pill.completed[data-selected]    { border-color: var(--s-completed-t); background: var(--s-completed); }

  .stat-pill.cancelled .stat-num         { color: var(--s-cancelled-t); }
  .stat-pill.cancelled[data-selected]    { border-color: var(--s-cancelled-t); background: var(--s-cancelled); }

  /* ── Toolbar ─────────────────────────────────────────── */
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-wrap { position: relative; flex: 1; }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    stroke: var(--c-text-muted); pointer-events: none;
  }
  .search-input {
    width: 100%; height: 48px;
    padding: 0 40px 0 44px;
    border: 1.5px solid var(--c-border);
    border-radius: var(--r);
    background: var(--c-surface);
    font-size: 15px; color: var(--c-text);
    -webkit-appearance: none;
    box-shadow: var(--shadow);
  }
  .search-clear {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--c-text-muted); padding: 4px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .filter-wrap { flex-shrink: 0; }

  /* ── Trip list ───────────────────────────────────────── */
  .trip-list { display: flex; flex-direction: column; gap: 14px; }
  @media (min-width: 640px) {
    .trip-list { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .trip-list .loading-state { grid-column: 1 / -1; }
  }

  /* ── Trip card ───────────────────────────────────────── */
  .trip-card {
    background: var(--c-surface);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .25s ease, transform .25s ease;
  }
  @media (min-width: 640px) {
    .trip-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.12); transform: translateY(-2px); }
  }
  .trip-card:active { transform: scale(.99); }
  .status-cancelled { opacity: .78; }

  /* Banner strip */
  .trip-card-banner {
    height: 60px;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 0 14px 10px;
    position: relative;
    overflow: hidden;
  }
  .trip-card-banner::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.15) 1.5px, transparent 1.5px);
    background-size: 20px 20px;
  }
  .status-planning  .trip-card-banner { background: var(--grad-planning); }
  .status-active    .trip-card-banner { background: var(--grad-active); }
  .status-done      .trip-card-banner { background: var(--grad-done); }
  .status-completed .trip-card-banner { background: var(--grad-completed); }
  .status-cancelled .trip-card-banner { background: var(--grad-cancelled); }

  .trip-card-body { flex: 1; padding: 14px 16px 10px; min-width: 0; }
  .trip-card-name {
    font-size: 16px; font-weight: 700;
    color: var(--c-text); line-height: 1.3;
    margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .trip-card-dest {
    font-size: 13px; color: var(--c-text-muted);
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .trip-card-meta {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--c-text-muted);
  }
  .trip-days-pill {
    display: inline-flex; align-items: center;
    background: var(--c-bg); border-radius: 6px;
    padding: 1px 6px; font-size: 11px; font-weight: 600;
    color: var(--c-text-muted); margin-left: 4px;
  }
  .trip-card-notes {
    font-size: 12px; color: var(--c-text-muted);
    margin-top: 8px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    padding-top: 8px; border-top: 1px solid var(--c-border);
  }

  /* Action row */
  .trip-card-actions { display: flex; border-top: 1px solid var(--c-border); }
  .card-action-btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 12px 6px;
    background: none; border: none; cursor: pointer;
    color: var(--c-text-muted);
    font-size: 12px; font-weight: 500;
    transition: background var(--ease), color var(--ease);
  }
  .card-action-btn + .card-action-btn { border-left: 1px solid var(--c-border); }
  .card-action-btn:hover       { background: var(--c-bg); color: var(--c-text); }
  .card-action-btn.sched:hover { background: var(--s-planning); color: var(--s-planning-t); }
  .card-action-btn.del:hover   { background: var(--s-cancelled); color: var(--c-danger); }

  /* ── Status badge ────────────────────────────────────── */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    white-space: nowrap; flex-shrink: 0;
    position: relative; z-index: 1;
    border: 1.5px solid rgba(255,255,255,.4);
    backdrop-filter: blur(4px);
  }
  .badge-planning  { background: rgba(255,255,255,.25); color: #fff; }
  .badge-active    { background: rgba(255,255,255,.25); color: #fff; }
  .badge-done      { background: rgba(255,255,255,.25); color: #fff; }
  .badge-completed { background: rgba(255,255,255,.25); color: #fff; }
  .badge-cancelled { background: rgba(255,255,255,.25); color: #fff; }

  /* ── Buttons ─────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    height: 44px; padding: 0 20px;
    border: none; border-radius: var(--r-sm);
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background var(--ease), transform var(--ease);
    white-space: nowrap; -webkit-tap-highlight-color: transparent;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.98); }
  .btn-primary { background: var(--c-primary); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--c-primary-dk); }
  .btn-ghost   { background: transparent; color: var(--c-text-muted); }
  .btn-ghost:hover:not(:disabled) { background: var(--c-bg); }
  .btn-danger  { background: var(--c-danger); color: #fff; }
  .btn-danger:hover:not(:disabled) { background: var(--c-danger-dk); }
  .btn-spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }

  /* ── FAB ─────────────────────────────────────────────── */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 20px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(79,70,229,.5);
    z-index: 90;
    transition: transform .2s ease, box-shadow .2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .fab:hover  { transform: scale(1.05); }
  .fab:active { transform: scale(.94); }
  @media (min-width: 640px) { .fab { display: none; } }

  /* ── Bottom sheet ────────────────────────────────────── */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.55);
    z-index: 200;
    animation: fade-in .2s ease;
  }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--c-surface);
    border-radius: 24px 24px 0 0;
    max-height: 92dvh; overflow-y: auto;
    z-index: 210;
    padding-bottom: env(safe-area-inset-bottom);
    transform: translateY(100%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
  }
  .sheet.open { transform: translateY(0); }

  @media (min-width: 640px) {
    .sheet {
      left: 50%; right: auto; bottom: auto; top: 50%;
      width: 540px;
      border-radius: var(--r);
      max-height: 90vh;
      transform: translate(-50%, -48%) scale(.96);
      opacity: 0;
      transition: transform .22s ease, opacity .22s ease;
    }
    .sheet.open { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    .sheet-handle { display: none; }
  }

  .sheet-sm { max-height: 60dvh; }
  @media (min-width: 640px) { .sheet-sm { width: 400px; } }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--c-border); border-radius: 4px;
    margin: 14px auto 0;
  }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 8px;
  }
  .sheet-title { font-size: 18px; font-weight: 700; }
  .sheet-close {
    background: var(--c-bg); border: none; cursor: pointer;
    color: var(--c-text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--ease);
  }
  .sheet-close:hover { background: var(--c-border); }
  .sheet-body {
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .sheet-footer {
    display: flex; gap: 10px;
    padding: 12px 20px 16px;
    border-top: 1px solid var(--c-border);
  }
  .sheet-footer .btn { flex: 1; }

  /* ── Form ────────────────────────────────────────────── */
  .sheet-body form {
    display: flex; flex-direction: column; gap: 20px;
  }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--c-text); }
  .req { color: var(--c-danger); }
  .form-input {
    width: 100%; height: 48px; padding: 0 13px;
    border: 1.5px solid var(--c-border);
    border-radius: var(--r-sm);
    font-size: 16px; color: var(--c-text);
    background: var(--c-surface);
    -webkit-appearance: none;
    transition: border-color var(--ease);
  }
  .form-input.error { border-color: var(--c-danger); }
  .form-textarea {
    height: auto; padding: 12px 13px;
    resize: none; font-family: inherit; line-height: 1.5;
  }
  .confirm-msg { font-size: 15px; color: var(--c-text-muted); line-height: 1.6; }
  .confirm-msg strong { color: var(--c-text); }

  /* Hide native selects before Select2 initialises — prevents flash */
  .filter-select2, .form-select2, .sched-status-s2 { display: none; }

  /* ── Select2 overrides ───────────────────────────────── */
  .filter-wrap .select2-container { width: auto !important; min-width: 140px; }
  .filter-wrap .select2-container--default .select2-selection--single {
    height: 48px; border: 1.5px solid var(--c-border);
    border-radius: var(--r); display: flex; align-items: center;
    background: var(--c-surface); box-shadow: var(--shadow);
  }
  .filter-wrap .select2-container--default .select2-selection--single .select2-selection__rendered {
    line-height: 48px; padding-left: 14px; padding-right: 32px;
    font-size: 15px; color: var(--c-text);
  }
  .filter-wrap .select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 48px; right: 8px;
  }
  .sheet-body .select2-container { width: 100% !important; }
  .sheet-body .select2-container--default .select2-selection--single {
    height: 48px; border: 1.5px solid var(--c-border);
    border-radius: var(--r-sm); display: flex; align-items: center;
  }
  .sheet-body .select2-container--default .select2-selection--single .select2-selection__rendered {
    line-height: 48px; padding-left: 13px; padding-right: 36px;
    font-size: 16px; color: var(--c-text);
  }
  .sheet-body .select2-container--default .select2-selection--single .select2-selection__arrow {
    height: 48px; right: 10px;
  }
  .select2-dropdown {
    border: 1.5px solid var(--c-border);
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-lg); overflow: hidden;
  }
  .select2-container--default .select2-results__option { padding: 12px 14px; font-size: 15px; }
  .select2-container--default .select2-results__option--highlighted[aria-selected] {
    background: var(--c-primary);
  }
  .select2-container--default .select2-results__option[aria-selected=true] {
    background: #ede9fe; color: var(--c-primary); font-weight: 600;
  }
  .select2-search--dropdown .select2-search__field {
    border: 1px solid var(--c-border); border-radius: 6px;
    padding: 8px 10px; font-size: 14px;
  }

  /* ── Loading / Empty ─────────────────────────────────── */
  .loading-state {
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; padding: 64px 24px;
    color: var(--c-text-muted); text-align: center;
  }
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; padding: 56px 24px;
    color: var(--c-text-muted); text-align: center;
  }
  .empty-icon {
    width: 80px; height: 80px;
    background: var(--c-bg); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }
  .empty-state h3 { font-size: 17px; font-weight: 700; color: var(--c-text); }
  .empty-state p  { font-size: 14px; margin-bottom: 8px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--c-border); border-top-color: var(--c-primary);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }

  /* ── Toast ───────────────────────────────────────────── */
  .toast-container {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; z-index: 400; pointer-events: none;
    width: calc(100% - 32px); max-width: 400px;
  }
  .toast {
    width: 100%; padding: 13px 18px;
    border-radius: var(--r-sm);
    background: #1e293b; color: #fff;
    font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-lg);
    animation: slide-up .22s ease;
    text-align: center;
  }
  .toast-success { background: #15803d; }
  .toast-error   { background: var(--c-danger); }

  /* ── Login screen ───────────────────────────────────── */
  .login-screen {
    position: fixed; inset: 0;
    background: #07071a;
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    overflow: hidden;
    transition: opacity .35s ease;
  }
  .login-screen.fade-out { opacity: 0; pointer-events: none; }

  /* Floating glow orbs */
  .login-orb {
    position: absolute; border-radius: 50%;
    filter: blur(72px); pointer-events: none;
    animation: orb-drift 10s ease-in-out infinite;
  }
  .login-orb-1 {
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(79,70,229,.55) 0%, transparent 70%);
    top: -160px; left: -140px;
    animation-duration: 12s;
  }
  .login-orb-2 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(124,58,237,.45) 0%, transparent 70%);
    bottom: -100px; right: -80px;
    animation-duration: 9s; animation-delay: -4s;
  }
  .login-orb-3 {
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(219,39,119,.35) 0%, transparent 70%);
    top: 45%; left: 55%;
    animation-duration: 14s; animation-delay: -7s;
  }
  .login-orb-4 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(6,182,212,.3) 0%, transparent 70%);
    bottom: 20%; left: 5%;
    animation-duration: 11s; animation-delay: -2s;
  }
  @keyframes orb-drift {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(28px,-24px) scale(1.06); }
    66%      { transform: translate(-18px,18px) scale(.94); }
  }

  /* Glass card */
  .login-box {
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.11);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-radius: 24px;
    padding: 36px 32px 32px;
    width: 100%; max-width: 400px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.06) inset,
                0 32px 80px rgba(0,0,0,.55);
    animation: slide-up .32s ease;
    position: relative; z-index: 1;
  }

  /* Logo */
  .login-logo {
    display: flex; align-items: center; gap: 13px;
    margin-bottom: 32px;
  }
  .login-logo-icon {
