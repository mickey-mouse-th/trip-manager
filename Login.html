<div class="login-screen" id="login-screen">
  <div class="login-box">

    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
      </div>
      <span>Trip Manager</span>
    </div>

    <!-- Login panel -->
    <div id="lp-login">
      <h2 class="login-title">Welcome back</h2>
      <p class="login-sub">Sign in to your account</p>
      <div class="login-error hidden" id="login-error"></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-name">Username</label>
          <input type="text" id="login-name" class="form-input" placeholder="Enter your username"
            autocapitalize="none" autocomplete="username" autocorrect="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Password</label>
          <input type="password" id="login-pass" class="form-input" placeholder="Enter your password"
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="btn-login">
          <span id="btn-login-label">Sign In</span>
          <span class="btn-spinner hidden" id="login-spinner"></span>
        </button>
      </form>
      <div class="login-divider"><span>or</span></div>
      <button type="button" class="btn-google" id="btn-google-login">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
      <p class="login-switch">No account? <a href="#" id="go-register">Register here</a></p>
    </div>

    <!-- Register panel -->
    <div id="lp-register" class="hidden">
      <h2 class="login-title">Create account</h2>
      <p class="login-sub">New accounts start as <strong>Viewer</strong> — admin can promote</p>
      <div class="login-error hidden" id="register-error"></div>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-name">Username</label>
          <input type="text" id="reg-name" class="form-input" placeholder="Min. 3 characters"
            autocapitalize="none" autocomplete="username" autocorrect="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass">Password</label>
          <input type="password" id="reg-pass" class="form-input" placeholder="Min. 6 characters"
            autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" class="form-input" placeholder="Repeat password"
            autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="btn-register">
          <span id="btn-register-label">Create Account</span>
          <span class="btn-spinner hidden" id="register-spinner"></span>
        </button>
      </form>
      <div class="login-divider"><span>or</span></div>
      <button type="button" class="btn-google" id="btn-google-register">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Register with Google
      </button>
      <p class="login-switch">Already have an account? <a href="#" id="go-login">Sign in</a></p>
    </div>

    <!-- Google new user panel — set display name -->
    <div id="lp-google-new" class="hidden">
      <h2 class="login-title">Almost there!</h2>
      <p class="login-sub">Choose a display name for your account</p>
      <div class="login-error hidden" id="google-new-error"></div>
      <form id="google-new-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="google-new-email">Google Email</label>
          <input type="text" id="google-new-email" class="form-input" disabled>
        </div>
        <div class="form-group">
          <label class="form-label" for="google-new-name">Display Name</label>
          <input type="text" id="google-new-name" class="form-input" placeholder="Min. 2 characters"
            autocapitalize="words" autocomplete="name">
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="btn-google-new">
          <span id="btn-google-new-label">Create Account</span>
          <span class="btn-spinner hidden" id="google-new-spinner"></span>
        </button>
      </form>
      <p class="login-switch"><a href="#" id="go-login-from-google">← Back to sign in</a></p>
    </div>

  </div>
</div>
