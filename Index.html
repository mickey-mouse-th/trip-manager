<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trip Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">
  <?!= include('Style') ?>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
        <span>Trip Manager</span>
      </div>
      <button class="btn-header-add" id="btn-add-trip-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Trip
      </button>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="app-main">

    <!-- Stats pills (also act as filter buttons) -->
    <div class="stats-strip">
      <button class="stat-pill active" data-filter="">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-lbl">All</span>
      </button>
      <button class="stat-pill planning" data-filter="Planning">
        <span class="stat-num" id="stat-planning">—</span>
        <span class="stat-lbl">Planning</span>
      </button>
      <button class="stat-pill active-trip" data-filter="Active">
        <span class="stat-num" id="stat-active">—</span>
        <span class="stat-lbl">Active</span>
      </button>
      <button class="stat-pill completed" data-filter="Completed">
        <span class="stat-num" id="stat-completed">—</span>
        <span class="stat-lbl">Done</span>
      </button>
      <button class="stat-pill cancelled" data-filter="Cancelled">
        <span class="stat-num" id="stat-cancelled">—</span>
        <span class="stat-lbl">Cancelled</span>
      </button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search trips…" autocomplete="off">
        <button class="search-clear hidden" id="search-clear" aria-label="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="filter-wrap">
        <select id="filter-status" class="filter-select2">
          <option value="">All Status</option>
          <option value="Planning">Planning</option>
          <option value="Active">Active</option>
          <option value="Completed">Completed</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
    </div>

    <!-- Trip list -->
    <div class="trip-list" id="trip-list">
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Loading your trips…</p>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
      </div>
      <h3>No trips found</h3>
      <p>Add your first trip or clear the filters.</p>
      <button class="btn btn-primary" id="btn-empty-add">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Trip
      </button>
    </div>

  </main>

  <!-- ── FAB (mobile only) ──────────────────────────────── -->
  <button class="fab" id="btn-add-trip-fab" aria-label="Add Trip">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ── Sheet backdrop ─────────────────────────────────── -->
  <div class="sheet-backdrop hidden" id="sheet-backdrop"></div>

  <!-- ── Add / Edit Trip sheet ──────────────────────────── -->
  <div class="sheet hidden" id="trip-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="modal-title">Add Trip</h2>
      <button class="sheet-close" id="modal-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <form id="trip-form" novalidate>
        <input type="hidden" id="field-id">
        <div class="form-group">
          <label class="form-label" for="field-name">Trip Name <span class="req">*</span></label>
          <input type="text" id="field-name" class="form-input" placeholder="e.g. Summer in Japan" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="field-destination">Destination <span class="req">*</span></label>
          <input type="text" id="field-destination" class="form-input" placeholder="e.g. Tokyo, Japan" autocomplete="off">
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label" for="field-start">Start Date <span class="req">*</span></label>
            <input type="date" id="field-start" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label" for="field-end">End Date <span class="req">*</span></label>
            <input type="date" id="field-end" class="form-input">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-status">Status</label>
          <select id="field-status" class="form-select2">
            <option value="Planning">Planning</option>
            <option value="Active">Active</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-notes">Notes</label>
          <textarea id="field-notes" class="form-input form-textarea" placeholder="Any notes about this trip…" rows="3"></textarea>
        </div>
      </form>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost" id="btn-cancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="btn-save">
        <span id="btn-save-label">Save Trip</span>
        <span class="btn-spinner hidden" id="btn-spinner"></span>
      </button>
    </div>
  </div>

  <!-- ── Confirm delete sheet ───────────────────────────── -->
  <div class="sheet-backdrop hidden" id="confirm-backdrop"></div>
  <div class="sheet sheet-sm hidden" id="confirm-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title">Delete Trip?</h2>
    </div>
    <div class="sheet-body">
      <p class="confirm-msg">
        <strong id="confirm-name"></strong> will be permanently deleted. This cannot be undone.
      </p>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost" id="confirm-cancel">Cancel</button>
      <button type="button" class="btn btn-danger" id="confirm-delete">Delete</button>
    </div>
  </div>

  <!-- ── Schedule list sheet ───────────────────────────── -->
  <div class="sheet-backdrop hidden" id="schedule-backdrop"></div>
  <div class="sheet sheet-full hidden" id="schedule-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-back" id="schedule-back" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="sheet-header-info">
        <h2 class="sheet-title" id="schedule-trip-name"></h2>
        <p class="sheet-subtitle" id="schedule-trip-dest"></p>
      </div>
      <button class="btn-export-pdf" id="btn-export-pdf" aria-label="Export PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </button>
      <button class="btn-add-sched" id="btn-add-schedule" aria-label="Add schedule">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body sched-body">
      <div class="loading-state hidden" id="schedule-loading">
        <div class="spinner"></div>
        <p>Loading schedules…</p>
      </div>
      <div class="schedule-timeline" id="schedule-list"></div>
      <div class="sched-empty hidden" id="schedule-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p>No schedules yet</p>
        <button class="btn btn-primary" id="btn-empty-schedule">Add First Schedule</button>
      </div>
    </div>
  </div>

  <!-- ── Schedule form sheet (on top of list) ───────────── -->
  <div class="sheet-backdrop sched-form-bd hidden" id="sched-form-backdrop"></div>
  <div class="sheet sched-form-sheet hidden" id="sched-form-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="sched-form-title">Add Schedule</h2>
      <button class="sheet-close" id="sched-form-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <form id="sched-form" novalidate>
        <input type="hidden" id="sf-id">
        <input type="hidden" id="sf-trip-id">
        <div class="form-group">
          <label class="form-label" for="sf-datetime">Date &amp; Time <span class="req">*</span></label>
          <input type="datetime-local" id="sf-datetime" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" for="sf-detail">Detail <span class="req">*</span></label>
          <input type="text" id="sf-detail" class="form-input" placeholder="e.g. Visit Senso-ji Temple" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="sf-transport">Transport</label>
          <input type="text" id="sf-transport" class="form-input" placeholder="e.g. BTS → Taxi" autocomplete="off">
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label" for="sf-cost">Cost (฿)</label>
            <input type="number" id="sf-cost" class="form-input" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label" for="sf-status">Status</label>
            <select id="sf-status" class="sched-status-s2">
              <option value="Planning">Planning</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Done">Done</option>
              <option value="Cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="sf-map">Map Link</label>
          <input type="url" id="sf-map" class="form-input" placeholder="https://maps.google.com/…">
        </div>
        <div class="form-group">
          <label class="form-label" for="sf-note">Note</label>
          <textarea id="sf-note" class="form-input form-textarea" rows="2" placeholder="Additional notes…"></textarea>
        </div>
      </form>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost" id="sf-cancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="sf-save">
        <span id="sf-save-label">Save</span>
        <span class="btn-spinner hidden" id="sf-spinner"></span>
      </button>
    </div>
  </div>

  <!-- ── Schedule delete confirm ────────────────────────── -->
  <div class="sheet-backdrop sched-form-bd hidden" id="sched-del-backdrop"></div>
  <div class="sheet sheet-sm sched-form-sheet hidden" id="sched-del-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title">Delete Schedule?</h2>
    </div>
    <div class="sheet-body">
      <p class="confirm-msg"><strong id="sched-del-name"></strong> will be permanently deleted.</p>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost" id="sched-del-cancel">Cancel</button>
      <button type="button" class="btn btn-danger" id="sched-del-confirm">Delete</button>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <?!= include('Script') ?>
</body>
</html>
