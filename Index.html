<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trip Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">
  <?!= include('Style') ?>
</head>
<body class="lang-en">

  <?!= include('Login') ?>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
        <span>Trip Manager</span>
      </div>
      <div class="header-right">
        <button class="btn-header-users hidden" id="btn-users" aria-label="Manage Users">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span class="lbl_users"></span>
        </button>
        <button class="btn-header-add hidden" id="btn-add-trip-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span class="lbl_addTrip"></span>
        </button>
        <div class="header-user hidden" id="header-user">
          <div class="header-avatar" id="header-avatar"></div>
          <div class="header-user-info hidden-xs">
            <span class="header-user-name" id="header-user-name"></span>
            <span class="header-user-role" id="header-user-role"></span>
          </div>
          <button class="btn-logout" id="btn-logout" aria-label="Sign out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="app-main">

    <!-- Stats pills (also act as filter buttons) -->
    <div class="stats-strip">
      <button class="stat-pill active" data-filter="">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-lbl lbl_allTrips"></span>
      </button>
      <button class="stat-pill planning" data-filter="Planning">
        <span class="stat-num" id="stat-planning">—</span>
        <span class="stat-lbl lbl_planning"></span>
      </button>
      <button class="stat-pill active-trip" data-filter="Active">
        <span class="stat-num" id="stat-active">—</span>
        <span class="stat-lbl lbl_active"></span>
      </button>
      <button class="stat-pill done" data-filter="Done">
        <span class="stat-num" id="stat-completed">—</span>
        <span class="stat-lbl lbl_done"></span>
      </button>
      <button class="stat-pill cancelled" data-filter="Cancelled">
        <span class="stat-num" id="stat-cancelled">—</span>
        <span class="stat-lbl lbl_cancelled"></span>
      </button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" class="search-input" data-i18n-ph="searchPlaceholder" placeholder="Search trips…" autocomplete="off">
        <button class="search-clear hidden" id="search-clear" aria-label="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="filter-wrap">
        <select id="filter-status" class="filter-select2">
          <option value="">All Status</option>
          <option value="Planning">Planning</option>
          <option value="Active">Active</option>
          <option value="Done">Done</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
    </div>

    <!-- Trip list -->
    <div class="trip-list" id="trip-list">
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p class="lbl_loading"></p>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
      </div>
      <h3 class="lbl_noTrips"></h3>
      <p class="lbl_noTripsDesc"></p>
      <button class="btn btn-primary" id="btn-empty-add">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span class="lbl_addTripBtn"></span>
      </button>
    </div>

  </main>

  <!-- ── FAB (mobile only) ──────────────────────────────── -->
  <button class="fab hidden" id="btn-add-trip-fab" aria-label="Add Trip">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ── Sheet backdrop ─────────────────────────────────── -->
  <div class="sheet-backdrop hidden" id="sheet-backdrop"></div>

  <!-- ── Add / Edit Trip sheet ──────────────────────────── -->
  <div class="sheet hidden" id="trip-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="modal-title">Add Trip</h2>
      <div class="sheet-header-actions">
        <!-- Cancel/Restore trip icon — only visible in edit mode -->
        <button type="button" class="btn-sheet-status hidden" id="btn-trip-cancel-toggle" aria-label="Cancel Trip">
          <!-- Ban icon = Cancel -->
          <svg class="icon-cancel-trip" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          <!-- Rotate-CCW icon = Restore -->
          <svg class="icon-restore-trip hidden" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.87"/>
          </svg>
        </button>
        <button class="sheet-close" id="modal-close" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="sheet-body">
      <form id="trip-form" novalidate>
        <input type="hidden" id="field-id">
        <!-- Cancelled state banner — shown only when trip is marked cancelled -->
        <div id="trip-cancelled-banner" class="cancelled-banner hidden">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
            <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          <span class="lbl_cancelledBanner"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-name"><span class="lbl_labelTripName"></span> <span class="req">*</span></label>
          <input type="text" id="field-name" class="form-input" data-i18n-ph="phTripName" placeholder="e.g. Summer in Japan" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="field-destination"><span class="lbl_labelDestination"></span> <span class="req">*</span></label>
          <input type="text" id="field-destination" class="form-input" data-i18n-ph="phDestination" placeholder="e.g. Tokyo, Japan" autocomplete="off">
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label" for="field-start"><span class="lbl_labelStartDate"></span> <span class="req">*</span></label>
            <input type="date" id="field-start" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label" for="field-end"><span class="lbl_labelEndDate"></span> <span class="req">*</span></label>
            <input type="date" id="field-end" class="form-input">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label lbl_labelNotes" for="field-notes"></label>
          <textarea id="field-notes" class="form-input form-textarea" data-i18n-ph="phNotes" placeholder="Any notes about this trip…" rows="3"></textarea>
        </div>
      </form>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost lbl_cancel" id="btn-cancel"></button>
      <button type="button" class="btn btn-primary" id="btn-save">
        <span id="btn-save-label">Save Trip</span>
        <span class="btn-spinner hidden" id="btn-spinner"></span>
      </button>
    </div>
  </div>

  <!-- ── Confirm delete sheet ───────────────────────────── -->
  <div class="sheet-backdrop hidden" id="confirm-backdrop"></div>
  <div class="sheet sheet-sm hidden" id="confirm-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title lbl_deleteTripQ"></h2>
    </div>
    <div class="sheet-body">
      <p class="confirm-msg">
        <strong id="confirm-name"></strong> <span class="lbl_deleteTripBody"></span>
      </p>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost lbl_cancel" id="confirm-cancel"></button>
      <button type="button" class="btn btn-danger lbl_delete" id="confirm-delete"></button>
    </div>
  </div>

  <!-- ── Schedule list sheet ───────────────────────────── -->
  <div class="sheet-backdrop hidden" id="schedule-backdrop"></div>
  <div class="sheet sheet-full hidden" id="schedule-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-back" id="schedule-back" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="sheet-header-info">
        <h2 class="sheet-title" id="schedule-trip-name"></h2>
        <p class="sheet-subtitle" id="schedule-trip-dest"></p>
      </div>
      <button class="btn-export-pdf" id="btn-export-pdf" aria-label="Export PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </button>
      <button class="btn-add-sched" id="btn-add-schedule" aria-label="Add schedule">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body sched-body">
      <div class="loading-state hidden" id="schedule-loading">
        <div class="spinner"></div>
        <p class="lbl_loadingScheds"></p>
      </div>
      <div class="schedule-timeline" id="schedule-list"></div>
      <div class="sched-empty hidden" id="schedule-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p class="lbl_noSchedules"></p>
        <button class="btn btn-primary lbl_addSchedule" id="btn-empty-schedule"></button>
      </div>
    </div>
  </div>

  <!-- ── Schedule form sheet ────────────────────────────── -->
  <div class="sheet-backdrop sched-form-bd hidden" id="sched-form-backdrop"></div>
  <div class="sheet sched-form-sheet hidden" id="sched-form-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="sched-form-title">Add Schedule</h2>
      <button class="sheet-close" id="sched-form-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <form id="sched-form" novalidate>
        <input type="hidden" id="sf-id">
        <input type="hidden" id="sf-trip-id">
        <div class="form-group">
          <label class="form-label" for="sf-datetime"><span class="lbl_labelDateTime"></span> <span class="req">*</span></label>
          <input type="datetime-local" id="sf-datetime" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" for="sf-detail"><span class="lbl_labelDetail"></span> <span class="req">*</span></label>
          <input type="text" id="sf-detail" class="form-input" data-i18n-ph="phDetail" placeholder="e.g. Visit Senso-ji Temple" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label lbl_labelTransport" for="sf-transport"></label>
          <input type="text" id="sf-transport" class="form-input" data-i18n-ph="phTransport" placeholder="e.g. BTS → Taxi" autocomplete="off">
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label class="form-label lbl_labelCost" for="sf-cost"></label>
            <input type="number" id="sf-cost" class="form-input" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label lbl_labelStatus" for="sf-status"></label>
            <select id="sf-status" class="sched-status-s2">
              <option value="Planning">Planning</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Done">Done</option>
              <option value="Cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label lbl_labelMapLink" for="sf-map"></label>
          <input type="url" id="sf-map" class="form-input" placeholder="https://maps.google.com/…">
        </div>
        <div class="form-group">
          <label class="form-label lbl_labelNote" for="sf-note"></label>
          <textarea id="sf-note" class="form-input form-textarea" rows="2" data-i18n-ph="phNote" placeholder="Additional notes…"></textarea>
        </div>
      </form>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost lbl_cancel" id="sf-cancel"></button>
      <button type="button" class="btn btn-primary" id="sf-save">
        <span id="sf-save-label">Save</span>
        <span class="btn-spinner hidden" id="sf-spinner"></span>
      </button>
    </div>
  </div>

  <!-- ── Schedule delete confirm ────────────────────────── -->
  <div class="sheet-backdrop sched-form-bd hidden" id="sched-del-backdrop"></div>
  <div class="sheet sheet-sm sched-form-sheet hidden" id="sched-del-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title lbl_deleteSchedQ"></h2>
    </div>
    <div class="sheet-body">
      <p class="confirm-msg"><strong id="sched-del-name"></strong> <span class="lbl_deleteBody"></span></p>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost lbl_cancel" id="sched-del-cancel"></button>
      <button type="button" class="btn btn-danger lbl_delete" id="sched-del-confirm"></button>
    </div>
  </div>

  <!-- ── Profile sheet ────────────────────────────────────── -->
  <div class="sheet-backdrop hidden" id="profile-backdrop"></div>
  <div class="sheet hidden" id="profile-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title lbl_profileTitle"></h2>
      <button class="sheet-close" id="profile-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <!-- Avatar -->
      <div class="profile-avatar-row">
        <div class="profile-avatar-lg" id="profile-avatar-lg"></div>
        <div class="profile-user-name" id="profile-display-name"></div>
        <div class="profile-user-role" id="profile-display-role"></div>
      </div>

      <!-- Display name -->
      <div>
        <p class="profile-section-title lbl_labelDisplayName"></p>
        <div class="form-group">
          <input type="text" id="pf-name" class="form-input" data-i18n-ph="phDisplayName" placeholder="Your display name" autocomplete="off">
        </div>
      </div>

      <!-- Password (local accounts only) -->
      <div id="pf-password-section">
        <p class="profile-section-title lbl_labelChangePassword"></p>
        <div class="form-group">
          <label class="form-label lbl_labelCurrentPw" for="pf-current-pass"></label>
          <input type="password" id="pf-current-pass" class="form-input" data-i18n-ph="phCurrentPw" placeholder="Enter current password" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label class="form-label lbl_labelNewPw" for="pf-new-pass"></label>
          <input type="password" id="pf-new-pass" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password">
        </div>
      </div>

      <!-- Language -->
      <div>
        <p class="profile-section-title lbl_labelLanguage"></p>
        <div class="lang-grid">
          <button type="button" class="lang-btn" data-lang="en">
            <span>🇬🇧</span><span>English</span>
          </button>
          <button type="button" class="lang-btn" data-lang="th">
            <span>🇹🇭</span><span>ไทย</span>
          </button>
          <button type="button" class="lang-btn" data-lang="lo">
            <span>🇱🇦</span><span>ລາວ</span>
          </button>
          <button type="button" class="lang-btn" data-lang="ja">
            <span>🇯🇵</span><span>日本語</span>
          </button>
          <button type="button" class="lang-btn" data-lang="zh">
            <span>🇨🇳</span><span>中文</span>
          </button>
        </div>
      </div>
    </div>
    <div class="sheet-footer">
      <button type="button" class="btn btn-ghost lbl_cancel" id="profile-cancel"></button>
      <button type="button" class="btn btn-primary" id="profile-save">
        <span id="profile-save-label" class="lbl_saveChanges"></span>
        <span class="btn-spinner hidden" id="profile-spinner"></span>
      </button>
    </div>
  </div>

  <!-- ── Users management sheet (admin only) ───────────── -->
  <div class="sheet-backdrop hidden" id="users-backdrop"></div>
  <div class="sheet sheet-full hidden" id="users-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title">Users</h2>
      <button class="sheet-close" id="users-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="loading-state hidden" id="users-loading">
        <div class="spinner"></div>
        <p>Loading users…</p>
      </div>
      <div class="users-list" id="users-list"></div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <?!= include('i18n_en') ?>
  <?!= include('i18n_th') ?>
  <?!= include('i18n_lo') ?>
  <?!= include('i18n_ja') ?>
  <?!= include('i18n_zh') ?>
  <?!= include('Script') ?>
</body>
</html>
